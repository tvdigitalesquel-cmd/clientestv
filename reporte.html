<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tv Digital - Reportes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #0a0d14;
            --bg-secondary: #0f1520;
            --bg-card: #131b28;
            --bg-card-hover: #1a2235;
            --bg-surface: #1c2740;
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(255,255,255,0.14);
            --accent: #3b7ff5;
            --accent-dim: rgba(59,127,245,0.12);
            --accent-glow: rgba(59,127,245,0.25);
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.12);
            --text-primary: #e8edf5;
            --text-secondary: #7a8a9e;
            --text-muted: #4a5568;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        html.light-mode {
            --bg-primary: #f0f4fa;
            --bg-secondary: #111318;
            --bg-card: #ffffff;
            --bg-card-hover: #f7faff;
            --bg-surface: #e8eef7;
            --border: rgba(0,0,0,0.08);
            --border-hover: rgba(59,127,245,0.25);
            --accent-dim: rgba(59,127,245,0.08);
            --text-primary: #1a2235;
            --text-secondary: #5a6a82;
            --text-muted: #9aa5b4;
        }

        /* Nav text/buttons in light mode (dark bg) */
        html.light-mode nav .nav-links a { color: rgba(255,255,255,0.55); }
        html.light-mode nav .nav-links a:hover { background: rgba(255,255,255,0.08); color: #fff; }
        html.light-mode nav .nav-links a.active { background: rgba(59,127,245,0.2); color: #6eaaff; }
        html.light-mode #info-sesion { color: rgba(255,255,255,0.35); }
        html.light-mode .theme-toggle { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
        html.light-mode .btn-logout { color: #f87171; border-color: rgba(239,68,68,0.35); }
        html.light-mode .btn-logout:hover { background: rgba(239,68,68,0.15); }
        html.light-mode .input-modern { background: #e4ecf9; border-color: rgba(59,127,245,0.2); color: #1a2235; }
        html.light-mode .input-modern:focus { background: #fff; border-color: var(--accent); }
        html.light-mode input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0); }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ─── ANIMATIONS ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 10px; }

        /* ─── NAV ─── */
        nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        .nav-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-links { display: flex; gap: 4px; }

        .nav-links a {
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .nav-links a:hover { background: var(--border); color: var(--text-primary); }
        .nav-links a.active { background: var(--accent-dim); color: var(--accent); }

        .nav-right { display: flex; align-items: center; gap: 12px; }

        #info-sesion {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
        }

        /* ─── THEME TOGGLE ─── */
        .theme-toggle {
            cursor: pointer;
            width: 44px; height: 24px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex; align-items: center;
            padding: 2px;
            transition: all 0.3s;
            position: relative;
        }
        .theme-toggle span {
            width: 20px; height: 20px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            transition: all 0.3s;
            position: absolute;
        }
        .theme-toggle .dark-icon { left: 2px; }
        .theme-toggle .light-icon { right: 2px; }
        .theme-toggle.active .dark-icon { opacity: 0.3; }
        .theme-toggle.active .light-icon { opacity: 1; }
        .theme-toggle:not(.active) .dark-icon { opacity: 1; }
        .theme-toggle:not(.active) .light-icon { opacity: 0.3; }

        /* ─── BTN LOGOUT ─── */
        .btn-logout {
            font-size: 12px; font-weight: 600;
            color: #ef4444;
            background: transparent;
            border: 1px solid rgba(239,68,68,0.25);
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.12); }

        /* ─── CONTAINER ─── */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        /* ─── PAGE HEADER ─── */
        .page-header { margin-bottom: 32px; }
        .page-header h1 {
            font-size: 26px; font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        .page-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

        /* ─── SHARED CARD SURFACE ─── */
        .card-surface {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        /* ─── SECTION TITLE ─── */
        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        /* ─── PERÍODO SELECTOR ─── */
        .periodo-section {
            padding: 22px 24px;
            margin-bottom: 20px;
        }

        .periodo-btn-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .periodo-btn {
            padding: 8px 18px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }

        .periodo-btn:hover:not(.active) {
            background: var(--border);
            color: var(--text-primary);
        }

        .periodo-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ─── RANGO PERSONALIZADO ─── */
        #rango-personalizado {
            margin-top: 16px;
            padding: 18px;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: flex-end;
        }

        #rango-personalizado.hidden { display: none; }

        .input-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
            letter-spacing: 0.02em;
        }

        .input-modern {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: all 0.2s;
        }

        .input-modern:focus { border-color: var(--accent); }
        .input-modern::placeholder { color: var(--text-muted); }

        /* ─── STAT CARDS ─── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .reporte-stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 22px 24px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.35s ease-out;
        }

        .reporte-stat::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--green);
            border-radius: 0 3px 3px 0;
        }

        .reporte-stat .stat-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .reporte-stat .stat-value {
            font-size: 30px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: -0.03em;
            font-family: 'DM Mono', monospace;
            line-height: 1;
        }

        /* ─── ACTION BUTTONS ─── */
        .actions-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            display: flex; align-items: center; gap: 7px;
        }
        .btn-primary:hover { background: #2d6fd4; transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
        .btn-primary:active { transform: scale(0.98); }

        .btn-green {
            background: var(--green);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            display: flex; align-items: center; gap: 7px;
        }
        .btn-green:hover { background: #16a34a; transform: translateY(-1px); }
        .btn-green:active { transform: scale(0.98); }

        /* ─── TABLE SECTION ─── */
        .table-section {
            padding: 22px 24px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease-out;
        }

        .tabla-reporte {
            border-collapse: collapse;
            width: 100%;
            min-width: 600px;
        }

        .tabla-reporte thead {
            background: var(--bg-surface);
        }

        .tabla-reporte th {
            padding: 12px 16px;
            text-align: left;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .tabla-reporte td {
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
        }

        .tabla-reporte tbody tr:last-child td {
            border-bottom: none;
        }

        .tabla-reporte tbody tr:hover td {
            background: var(--bg-surface);
        }

        /* total row */
        .tabla-reporte tbody tr.total-row td {
            border-top: 1px solid var(--border-hover);
            border-bottom: none;
            font-weight: 700;
            color: var(--green);
            background: var(--green-dim);
            font-family: 'DM Mono', monospace;
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { font-size: 14px; }
        .empty-state p.sub { font-size: 12px; margin-top: 5px; opacity: 0.7; }

        /* ─── PRINT ─── */
        @media print {
            nav, .actions-row, .periodo-section { display: none !important; }
            .tabla-reporte th, .tabla-reporte td { border: 1px solid #ccc; padding: 8px; }
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .nav-inner { padding: 0 14px; height: 54px; }
            #info-sesion { display: none; }
            .container { padding: 20px 14px 70px; }
            .stats-grid { grid-template-columns: 1fr; gap: 10px; }
            #rango-personalizado { grid-template-columns: 1fr; }
            .actions-row { flex-direction: column; }
            .btn-primary, .btn-green { justify-content: center; }
            .periodo-section, .table-section { padding: 16px; }
        }

        @media (max-width: 480px) {
            .reporte-stat .stat-value { font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- ─── NAVBAR ─── -->
    <nav>
        <div class="nav-inner">
            <div class="nav-links">
                <a href="index.html">Mis Clientes</a>
                <a href="equipo.html" id="link-equipos" style="display:none;">Equipo</a>
                <a href="reporte.html" class="active">Reportes</a>
            </div>
            <div class="nav-right">
                <span id="info-sesion"></span>
                <button onclick="toggleTheme()" class="theme-toggle" title="Cambiar tema">
                    <span class="dark-icon">🌙</span>
                    <span class="light-icon">☀️</span>
                </button>
                <button onclick="logout()" class="btn-logout">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- ─── PAGE HEADER ─── -->
        <div class="page-header">
            <h1>Reportes de Ingresos</h1>
            <p>Analizá lo facturado por período</p>
        </div>

        <!-- ─── PERÍODO SELECTOR ─── -->
        <div class="card-surface periodo-section" style="margin-bottom:20px;">
            <div class="section-title">Seleccionar Período</div>
            <div class="periodo-btn-container">
                <button onclick="cambiarPeriodoReporte('semana')" class="periodo-btn active" id="btn-semana">Semana</button>
                <button onclick="cambiarPeriodoReporte('mes')" class="periodo-btn" id="btn-mes">Mes</button>
                <button onclick="cambiarPeriodoReporte('año')" class="periodo-btn" id="btn-año">Año</button>
                <button onclick="cambiarPeriodoReporte('personalizado')" class="periodo-btn" id="btn-personalizado">Personalizado</button>
            </div>

            <div id="rango-personalizado" class="hidden">
                <div>
                    <label class="input-label">Desde</label>
                    <input type="date" id="fecha-desde" class="input-modern">
                </div>
                <div>
                    <label class="input-label">Hasta</label>
                    <input type="date" id="fecha-hasta" class="input-modern">
                </div>
                <div>
                    <button onclick="aplicarRangoPersonalizado()" class="btn-primary" style="width:100%; justify-content:center;">Aplicar</button>
                </div>
            </div>
        </div>

        <!-- ─── STATS ─── -->
        <div class="stats-grid">
            <div class="reporte-stat">
                <div class="stat-label">Total Facturado</div>
                <div class="stat-value">$<span id="reporte-total">0.00</span></div>
            </div>
            <div class="reporte-stat">
                <div class="stat-label">Clientes Facturados</div>
                <div class="stat-value"><span id="reporte-clientes">0</span></div>
            </div>
            <div class="reporte-stat">
                <div class="stat-label">Promedio por Cliente</div>
                <div class="stat-value">$<span id="reporte-promedio">0.00</span></div>
            </div>
        </div>

        <!-- ─── ACTION BUTTONS ─── -->
        <div class="actions-row">
            <button onclick="descargarExcel()" class="btn-green">
                📥 Descargar Excel
            </button>
            <button onclick="imprimirReporte()" class="btn-primary">
                🖨️ Imprimir
            </button>
        </div>

        <!-- ─── TABLE ─── -->
        <div class="card-surface table-section">
            <div class="section-title">Detalle de Facturación</div>
            <div id="tabla-contenedor">
                <div class="empty-state">
                    <div class="empty-icon">📊</div>
                    <p>Cargando datos...</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://vjbdhbbxbvoigbidquya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4ogrbtxBrBWBFj-NRJOrbg_XnpmO4pS';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosClientes = [];
        let periodoReporte = 'semana';
        let currentUser = JSON.parse(localStorage.getItem('session_tvdigital'));
        let fechaDesdePersonalizado = null;
        let fechaHastaPersonalizado = null;

        function toggleTheme() {
            const html = document.documentElement;
            const isLightMode = html.classList.contains('light-mode');
            if (isLightMode) {
                html.classList.remove('light-mode');
                localStorage.setItem('theme', 'dark');
                document.querySelector('.theme-toggle').classList.remove('active');
            } else {
                html.classList.add('light-mode');
                localStorage.setItem('theme', 'light');
                document.querySelector('.theme-toggle').classList.add('active');
            }
        }

        function checkSession() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
                document.querySelector('.theme-toggle').classList.add('active');
            }

            if (!currentUser) { window.location.href = 'logueo.html'; return; }
            if (currentUser.rol === 'admin' || currentUser.rol === 'revendedor') {
                document.getElementById('link-equipos').style.display = '';
            }

            let infoText = `${currentUser.rol.toUpperCase()} · ${currentUser.username}`;
            if (currentUser.vencimiento_acceso) {
                const venciDate = new Date(currentUser.vencimiento_acceso);
                const hoy = new Date();
                const diasRestantes = Math.ceil((venciDate - hoy) / (1000 * 60 * 60 * 24));
                infoText += ` · ${diasRestantes > 0 ? diasRestantes + 'd' : 'Vencido'}`;
            }
            document.getElementById('info-sesion').innerText = infoText;

            cargarClientes();
        }

        async function cargarClientes() {
            const { data } = await supabaseClient.from('clientes').select('*').eq('creado_por', currentUser.id).order('fecha_pago', { ascending: false });
            todosLosClientes = data || [];
            actualizarReporte();
        }

        function cambiarPeriodoReporte(periodo) {
            periodoReporte = periodo;
            document.querySelectorAll('.periodo-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + periodo).classList.add('active');

            const rangoDiv = document.getElementById('rango-personalizado');
            if (periodo === 'personalizado') {
                rangoDiv.classList.remove('hidden');
            } else {
                rangoDiv.classList.add('hidden');
            }

            actualizarReporte();
        }

        function aplicarRangoPersonalizado() {
            fechaDesdePersonalizado = document.getElementById('fecha-desde').value;
            fechaHastaPersonalizado = document.getElementById('fecha-hasta').value;

            if (!fechaDesdePersonalizado || !fechaHastaPersonalizado) {
                alert('Por favor seleccioná ambas fechas');
                return;
            }

            actualizarReporte();
        }

        function obtenerFechasReporte() {
            const hoy = new Date();
            let fechaInicio;
            let fechaFin = hoy;

            if (periodoReporte === 'semana') {
                fechaInicio = new Date(hoy);
                fechaInicio.setDate(hoy.getDate() - hoy.getDay());
            } else if (periodoReporte === 'mes') {
                fechaInicio = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
            } else if (periodoReporte === 'año') {
                fechaInicio = new Date(hoy.getFullYear(), 0, 1);
            } else if (periodoReporte === 'personalizado') {
                fechaInicio = new Date(fechaDesdePersonalizado);
                fechaFin = new Date(fechaHastaPersonalizado);
            }

            return { fechaInicio, fechaFin };
        }

        function actualizarReporte() {
            const { fechaInicio, fechaFin } = obtenerFechasReporte();

            let datosReporte = [];
            let totalFacturado = 0;
            let clientesFacturados = new Set();

            todosLosClientes.forEach(c => {
                const fechaPago = new Date(c.fecha_pago || c.fecha_vencimiento);

                if (fechaPago >= fechaInicio && fechaPago <= fechaFin) {
                    const precio = parseFloat(c.precio) || 0;
                    totalFacturado += precio;
                    clientesFacturados.add(c.id);

                    datosReporte.push({
                        nombre: c.nombre_apellido,
                        app: c.app_instalada,
                        usuario: c.usuario,
                        ciudad: c.ciudad,
                        telefono: c.celular,
                        precio: precio,
                        fechaPago: c.fecha_pago || 'Sin registrar',
                        fechaVencimiento: c.fecha_vencimiento
                    });
                }
            });

            datosReporte.sort((a, b) => new Date(b.fechaPago) - new Date(a.fechaPago));

            const cantidadClientes = clientesFacturados.size;
            const promedio = cantidadClientes > 0 ? (totalFacturado / cantidadClientes).toFixed(2) : '0.00';

            document.getElementById('reporte-total').innerText = totalFacturado.toFixed(2);
            document.getElementById('reporte-clientes').innerText = cantidadClientes;
            document.getElementById('reporte-promedio').innerText = promedio;

            generarTabla(datosReporte, totalFacturado);
        }

        function generarTabla(datos, total) {
            const contenedor = document.getElementById('tabla-contenedor');

            if (datos.length === 0) {
                contenedor.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>Sin datos en este período</p>
                        <p class="sub">No hay clientes pagados en el rango seleccionado</p>
                    </div>`;
                return;
            }

            let html = `
                <div class="table-wrapper">
                <table class="tabla-reporte">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Aplicación</th>
                            <th>Usuario</th>
                            <th>Ciudad</th>
                            <th>Teléfono</th>
                            <th>Precio</th>
                            <th>Fecha Pago</th>
                            <th>Vencimiento</th>
                        </tr>
                    </thead>
                    <tbody>`;

            datos.forEach(d => {
                html += `
                    <tr>
                        <td>${d.nombre}</td>
                        <td>${d.app}</td>
                        <td style="font-family:'DM Mono',monospace; font-size:12px;">${d.usuario}</td>
                        <td>${d.ciudad}</td>
                        <td style="font-family:'DM Mono',monospace; font-size:12px;">${d.telefono}</td>
                        <td style="font-family:'DM Mono',monospace; font-weight:600;">$${d.precio.toFixed(2)}</td>
                        <td>${d.fechaPago}</td>
                        <td>${d.fechaVencimiento}</td>
                    </tr>`;
            });

            html += `
                        <tr class="total-row">
                            <td colspan="5" style="text-align:right; font-size:11px; letter-spacing:0.08em; text-transform:uppercase;">Total</td>
                            <td>$${total.toFixed(2)}</td>
                            <td></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
                </div>`;

            contenedor.innerHTML = html;
        }

        function descargarExcel() {
            const { fechaInicio, fechaFin } = obtenerFechasReporte();

            let datosExcel = [];
            let totalFacturado = 0;

            todosLosClientes.forEach(c => {
                const fechaPago = new Date(c.fecha_pago || c.fecha_vencimiento);
                if (fechaPago >= fechaInicio && fechaPago <= fechaFin) {
                    const precio = parseFloat(c.precio) || 0;
                    totalFacturado += precio;
                    datosExcel.push({
                        'Nombre Cliente': c.nombre_apellido,
                        'Aplicación': c.app_instalada,
                        'Usuario': c.usuario,
                        'Ciudad': c.ciudad,
                        'Teléfono': c.celular,
                        'Precio ($)': precio.toFixed(2),
                        'Fecha Pago': c.fecha_pago || 'Sin registrar',
                        'Fecha Vencimiento': c.fecha_vencimiento
                    });
                }
            });

            datosExcel.push({
                'Nombre Cliente': '', 'Aplicación': '', 'Usuario': '', 'Ciudad': 'TOTAL',
                'Teléfono': '', 'Precio ($)': totalFacturado.toFixed(2),
                'Fecha Pago': '', 'Fecha Vencimiento': ''
            });

            const worksheet = XLSX.utils.json_to_sheet(datosExcel);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, 'Reporte');
            worksheet['!cols'] = [{ wch: 20 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 12 }, { wch: 15 }, { wch: 18 }];

            const fecha = new Date().toLocaleDateString('es-ES').replace(/\//g, '-');
            XLSX.writeFile(workbook, `Reporte_${periodoReporte}_${fecha}.xlsx`);
        }

        function imprimirReporte() { window.print(); }

        function logout() {
            localStorage.removeItem('session_tvdigital');
            window.location.href = 'logueo.html';
        }

        window.onload = checkSession;
    </script>
</body>
</html>
