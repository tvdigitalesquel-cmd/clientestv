<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecno Store - Panel TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-gray-750 { background-color: #2d3748; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen">

    <div class="container mx-auto px-4 py-6">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-blue-500 uppercase tracking-wider">Panel Clientes</h1>
                <p class="text-gray-400 text-xs">Administración de Suscripciones</p>
            </div>
            <button onclick="abrirModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl font-bold shadow-lg transition transform active:scale-95">
                + Nuevo
            </button>
        </header>

        <div id="contenedor-clientes" class="grid gap-4">
            <div class="text-center py-10 text-gray-500">Conectando con Supabase...</div>
        </div>
    </div>

    <div id="modalCliente" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 rounded-2xl p-6 w-full max-w-md border border-gray-700 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitulo" class="text-xl font-bold text-blue-400">Nuevo Cliente</h2>
                <button onclick="cerrarModal()" class="text-gray-500 text-2xl">&times;</button>
            </div>
            
            <form id="formCliente" class="space-y-4">
                <input type="hidden" id="clienteId">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Nombre Completo</label>
                    <input type="text" id="nombre" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Usuario</label>
                        <input type="text" id="usuario" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Clave</label>
                        <input type="text" id="clave" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">App</label>
                        <select id="app" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none">
                            <option value="LUMIX">LUMIX</option>
                            <option value="TV PLUS 2">TV PLUS 2</option>
                            <option value="FEMON">FEMON</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Vencimiento</label>
                        <input type="date" id="vencimiento" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none" required>
                    </div>
                </div>
                
                <div class="pt-4">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold transition">
                        Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vjbdhbbxbvoigbidquya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4ogrbtxBrBWBFj-NRJOrbg_XnpmO4pS';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function abrirModal(editData = null) {
            const modal = document.getElementById('modalCliente');
            const titulo = document.getElementById('modalTitulo');
            const form = document.getElementById('formCliente');
            
            form.reset();
            document.getElementById('clienteId').value = '';

            if (editData) {
                titulo.innerText = "Editar Cliente";
                document.getElementById('clienteId').value = editData.id;
                document.getElementById('nombre').value = editData.nombre_apellido;
                document.getElementById('usuario').value = editData.usuario;
                document.getElementById('clave').value = editData.clave;
                document.getElementById('app').value = editData.app_instalada;
                document.getElementById('vencimiento').value = editData.fecha_vencimiento;
            } else {
                titulo.innerText = "Nuevo Cliente";
            }
            modal.classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modalCliente').classList.add('hidden');
        }

        async function cargarClientes() {
            const contenedor = document.getElementById('contenedor-clientes');
            const { data, error } = await supabaseClient.from('clientes').select('*').order('fecha_vencimiento', { ascending: true });

            if (error) return;

            contenedor.innerHTML = '';
            data.forEach(c => {
                const hoy = new Date();
                const venc = new Date(c.fecha_vencimiento);
                const dias = Math.ceil((venc - hoy) / (1000 * 60 * 60 * 24));
                const colorDias = dias <= 0 ? 'text-red-500' : dias <= 5 ? 'text-yellow-500' : 'text-green-400';

                contenedor.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-4 rounded-2xl shadow-sm flex justify-between items-center">
                        <div class="flex-1">
                            <h3 class="font-bold text-lg text-white">${c.nombre_apellido}</h3>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[10px] bg-blue-900 text-blue-300 px-2 py-0.5 rounded font-bold">${c.app_instalada}</span>
                                <span class="text-sm text-gray-400 font-mono">${c.usuario}</span>
                            </div>
                        </div>
                        <div class="text-right mr-4">
                            <div class="font-black ${colorDias} text-xl">${dias <= 0 ? 'Vencido' : dias + ' d'}</div>
                            <div class="text-[10px] text-gray-500 font-bold">${c.fecha_vencimiento}</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='abrirModal(${JSON.stringify(c)})' class="bg-gray-700 p-2 rounded-lg text-blue-400">✏️</button>
                            <button onclick="eliminarCliente(${c.id})" class="bg-gray-700 p-2 rounded-lg text-red-500">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        async function eliminarCliente(id) {
            if (confirm('¿Seguro que quieres eliminar este cliente?')) {
                const { error } = await supabaseClient.from('clientes').delete().eq('id', id);
                if (!error) cargarClientes();
            }
        }

        document.getElementById('formCliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('clienteId').value;
            const datos = {
                nombre_apellido: document.getElementById('nombre').value,
                usuario: document.getElementById('usuario').value,
                clave: document.getElementById('clave').value,
                app_instalada: document.getElementById('app').value,
                fecha_vencimiento: document.getElementById('vencimiento').value
            };

            let res;
            if (id) {
                res = await supabaseClient.from('clientes').update(datos).eq('id', id);
            } else {
                res = await supabaseClient.from('clientes').insert([datos]);
            }

            if (!res.error) {
                cerrarModal();
                cargarClientes();
            } else {
                alert("Error: " + res.error.message);
            }
        });

        window.onload = cargarClientes;
    </script>
</body>
</html>
