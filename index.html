<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tv Digital - Panel Privado</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(var(--tw-date-invert, 1)); }
        @keyframes pulse-red {
            0%, 100% { background-color: rgba(220, 38, 38, 0.1); border-color: #ef4444; }
            50% { background-color: rgba(220, 38, 38, 0.3); border-color: #f87171; }
        }
        .alerta-vencimiento { animation: pulse-red 2s infinite; border-width: 2px; }
        .filtro-activo { border-color: #3b82f6 !important; font-weight: 800; transform: scale(1.05); }
        .dashboard-card { cursor: pointer; transition: transform 0.2s; }
        .dashboard-card:active { transform: scale(0.95); }
        .card-seleccionada { ring: 4px solid #3b82f6; ring-offset: 2px; }
        
        .light .bg-gray-900 { background-color: #f3f4f6; color: #1f2937; }
        .light .bg-gray-800 { background-color: #ffffff; color: #1f2937; }
        .light .border-gray-700 { border-color: #e5e7eb; }
        .light .text-white { color: #1f2937; }
        .light .text-gray-400 { color: #6b7280; }
        .light { --tw-date-invert: 0; }
        .tab-activa { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen pb-20 transition-colors duration-300">

    <div id="pantalla-login" class="fixed inset-0 bg-gray-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-gray-800 p-8 rounded-2xl border border-gray-700 w-full max-w-sm shadow-2xl">
            <h1 class="text-2xl font-black text-blue-500 mb-6 text-center uppercase italic">Tv Digital Login</h1>
            <form id="formLogin" class="space-y-4">
                <input type="text" id="loginUser" placeholder="Usuario" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl outline-none text-white" required>
                <input type="password" id="loginPass" placeholder="Contraseña" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl outline-none text-white" required>
                <button type="submit" class="w-full bg-blue-600 p-3 rounded-xl font-bold uppercase hover:bg-blue-700 transition">Entrar</button>
                <p id="loginError" class="text-red-500 text-xs text-center hidden italic mt-2">Acceso denegado</p>
            </form>
        </div>
    </div>

    <div id="contenido-app" class="hidden">
        <nav class="bg-gray-800 border-b border-gray-700 mb-6">
            <div class="container mx-auto px-4 flex justify-between items-center">
                <div class="flex gap-6">
                    <button onclick="cambiarSeccion('clientes')" id="tab-clientes" class="py-4 font-bold uppercase text-xs tab-activa">Mis Clientes</button>
                    <button onclick="cambiarSeccion('usuarios')" id="tab-usuarios" class="py-4 font-bold uppercase text-xs hidden">Admin Usuarios</button>
                </div>
                <div class="flex items-center gap-4">
                    <span id="display-user" class="text-[10px] text-gray-500 font-bold uppercase"></span>
                    <button onclick="toggleTheme()" class="text-xl">☀️</button>
                    <button onclick="logout()" class="text-red-500 font-bold text-xs uppercase underline">Salir</button>
                </div>
            </div>
        </nav>

        <div class="container mx-auto px-4">
            <section id="sec-clientes">
                <header class="flex justify-between items-center mb-6">
                    <h1 class="text-xl font-bold text-blue-500 uppercase">Panel Personal</h1>
                    <button onclick="abrirModal()" class="bg-blue-600 px-5 py-2 rounded-xl font-bold shadow-lg">+ Nuevo</button>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 text-white text-center">
                    <div id="btn-filtro-activos" onclick="cambiarFiltroEstado('ACTIVOS')" class="dashboard-card bg-green-700 p-4 rounded-xl shadow-lg border-b-4 border-green-900">
                        <p class="text-xs uppercase font-bold opacity-80">Activos</p>
                        <h2 id="count-activos" class="text-4xl font-black my-2">0</h2>
                    </div>
                    <div id="btn-filtro-vencidos" onclick="cambiarFiltroEstado('VENCIDOS')" class="dashboard-card bg-red-600 p-4 rounded-xl shadow-lg border-b-4 border-red-800">
                        <p class="text-xs uppercase font-bold opacity-80">Vencidos</p>
                        <h2 id="count-vencidos" class="text-4xl font-black my-2">0</h2>
                    </div>
                    <div id="btn-filtro-pronto" onclick="cambiarFiltroEstado('PRONTO')" class="dashboard-card bg-yellow-500 p-4 rounded-xl shadow-lg border-b-4 border-yellow-700 text-gray-900">
                        <p class="text-xs uppercase font-bold opacity-80">Vencen pronto</p>
                        <h2 id="count-pronto" class="text-4xl font-black my-2 text-gray-900">0</h2>
                    </div>
                </div>

                <div class="space-y-4 mb-8">
                    <input type="text" id="inputBusqueda" onkeyup="filtrarClientes()" placeholder="🔍 Buscar en mis clientes..." 
                       class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white outline-none focus:border-blue-500">
                    <div class="flex flex-wrap gap-2">
                        <button onclick="cambiarFiltroApp('TODOS', this)" class="btn-app filtro-activo flex-1 bg-gray-700 py-2 rounded-lg text-xs font-bold uppercase">Todas</button>
                        <button onclick="cambiarFiltroApp('LUMIX', this)" class="btn-app flex-1 bg-blue-600 py-2 rounded-lg text-xs font-bold uppercase">Lumix</button>
                        <button onclick="cambiarFiltroApp('TV PLUS 2', this)" class="btn-app flex-1 bg-green-600 py-2 rounded-lg text-xs font-bold uppercase">TV Plus 2</button>
                        <button onclick="cambiarFiltroApp('FEMON', this)" class="btn-app flex-1 bg-purple-600 py-2 rounded-lg text-xs font-bold uppercase">Femon</button>
                    </div>
                </div>

                <div id="contenedor-clientes" class="grid gap-4"></div>
            </section>

            <section id="sec-usuarios" class="hidden">
                <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 mb-6">
                    <h2 class="text-xl font-bold text-blue-500 mb-4 uppercase">Crear Usuario de Sistema</h2>
                    <form id="formNuevoUsuario" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="newUsername" placeholder="Usuario" class="bg-gray-900 p-3 rounded-xl border border-gray-700 outline-none" required>
                        <input type="password" id="newPassword" placeholder="Clave" class="bg-gray-900 p-3 rounded-xl border border-gray-700 outline-none" required>
                        <select id="newRol" class="bg-gray-900 p-3 rounded-xl border border-gray-700 outline-none text-white">
                            <option value="vendedor">Vendedor (Solo ve sus propios clientes)</option>
                            <option value="admin">Administrador (Control total)</option>
                        </select>
                        <button type="submit" class="bg-blue-600 font-bold rounded-xl uppercase text-xs">Crear Acceso</button>
                    </form>
                </div>
                <div id="lista-usuarios-sistema" class="grid gap-3"></div>
            </section>
        </div>
    </div>

    <div id="modalCliente" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 rounded-2xl p-6 w-full max-w-md border border-gray-700 text-white">
            <h2 id="modalTitulo" class="text-xl font-bold text-blue-500 mb-4">Datos Cliente</h2>
            <form id="formCliente" class="space-y-4">
                <input type="hidden" id="clienteId">
                <input type="text" id="nombre" placeholder="Nombre" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="tel" id="celular" placeholder="Celular" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none">
                    <input type="text" id="ciudad" placeholder="Ciudad" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="usuario" placeholder="Usuario App" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none" required>
                    <input type="text" id="clave" placeholder="Clave" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="app" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none text-white">
                        <option value="LUMIX">LUMIX</option>
                        <option value="TV PLUS 2">TV PLUS 2</option>
                        <option value="FEMON">FEMON</option>
                    </select>
                    <input type="date" id="vencimiento" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none" required>
                </div>
                <input type="number" id="precio" placeholder="Precio $" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none">
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="cerrarModal()" class="flex-1 bg-gray-700 py-3 rounded-xl font-bold uppercase">Cancelar</button>
                    <button type="submit" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold uppercase">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vjbdhbbxbvoigbidquya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4ogrbtxBrBWBFj-NRJOrbg_XnpmO4pS';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosClientes = [];
        let filtroAppActual = 'TODOS';
        let filtroEstadoActual = 'TODOS';
        let currentUser = JSON.parse(localStorage.getItem('session_tvdigital'));

        // --- SESIÓN ---
        document.getElementById('formLogin').onsubmit = async (e) => {
            e.preventDefault();
            const { data } = await supabaseClient.from('usuarios_sistema')
                .select('*').eq('username', document.getElementById('loginUser').value)
                .eq('password', document.getElementById('loginPass').value).single();

            if (data) { localStorage.setItem('session_tvdigital', JSON.stringify(data)); location.reload(); }
            else { document.getElementById('loginError').classList.remove('hidden'); }
        };

        function checkSession() {
            if (currentUser) {
                document.getElementById('pantalla-login').classList.add('hidden');
                document.getElementById('contenido-app').classList.remove('hidden');
                document.getElementById('display-user').innerText = `Sesión: ${currentUser.username}`;
                if (currentUser.rol === 'admin') document.getElementById('tab-usuarios').classList.remove('hidden');
                cargarClientes();
            }
        }

        function logout() { localStorage.removeItem('session_tvdigital'); location.reload(); }

        // --- LÓGICA DE DATOS PRIVADOS ---
        async function cargarClientes() {
            // Solo pedimos los clientes que pertenecen a este usuario
            const { data, error } = await supabaseClient.from('clientes')
                .select('*')
                .eq('creado_por', currentUser.id)
                .order('fecha_vencimiento', { ascending: true });
            
            if (!error) {
                todosLosClientes = data;
                actualizarDashboard(data);
                filtrarClientes();
            }
        }

        document.getElementById('formCliente').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('clienteId').value;
            const datos = {
                nombre_apellido: document.getElementById('nombre').value,
                celular: document.getElementById('celular').value,
                ciudad: document.getElementById('ciudad').value,
                usuario: document.getElementById('usuario').value,
                clave: document.getElementById('clave').value,
                app_instalada: document.getElementById('app').value,
                fecha_vencimiento: document.getElementById('vencimiento').value,
                precio: parseFloat(document.getElementById('precio').value) || 0,
                creado_por: currentUser.id // Vinculamos al creador
            };
            if (id) await supabaseClient.from('clientes').update(datos).eq('id', id);
            else await supabaseClient.from('clientes').insert([datos]);
            cerrarModal(); cargarClientes();
        };

        // --- FILTROS Y UI (Misma lógica pero sobre datos filtrados) ---
        function filtrarClientes() {
            const bus = document.getElementById('inputBusqueda').value.toLowerCase();
            const cont = document.getElementById('contenedor-clientes');
            const hoy = new Date();
            
            const filtrados = todosLosClientes.filter(c => {
                const dias = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const coincideBus = c.nombre_apellido.toLowerCase().includes(bus) || c.usuario.toLowerCase().includes(bus);
                const coincideApp = filtroAppActual === 'TODOS' || c.app_instalada === filtroAppActual;
                let coincideEst = true;
                if (filtroEstadoActual === 'ACTIVOS') coincideEst = dias > 0;
                if (filtroEstadoActual === 'VENCIDOS') coincideEst = dias <= 0;
                if (filtroEstadoActual === 'PRONTO') coincideEst = (dias > 0 && dias <= 7);
                return coincideBus && coincideApp && coincideEst;
            });

            cont.innerHTML = '';
            filtrados.forEach(c => {
                const dias = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const esAlerta = dias <= 2;
                cont.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-4 rounded-2xl flex justify-between items-center ${esAlerta ? 'alerta-vencimiento' : ''}">
                        <div class="flex-1">
                            <h3 class="font-bold">${c.nombre_apellido}</h3>
                            <p class="text-[10px] text-gray-400 uppercase font-black">${c.app_instalada} | ${c.usuario}</p>
                            <p class="text-[9px] text-blue-400 font-bold">${c.celular || 'Sin Cel'}</p>
                        </div>
                        <div class="text-right mr-4">
                            <p class="text-lg font-black ${dias <= 0 ? 'text-red-500' : 'text-green-500'}">${dias <= 0 ? 'Vencido' : dias + ' d'}</p>
                            <p class="text-xs font-bold text-blue-500">$${c.precio}</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            <div class="flex gap-1">
                                <button onclick='abrirModal(${JSON.stringify(c)})' class="bg-gray-700 p-2 rounded-lg text-blue-400 text-xs">Edit</button>
                                <button onclick="eliminarCliente(${c.id})" class="bg-gray-700 p-2 rounded-lg text-red-500 text-xs">Elim</button>
                            </div>
                            <button onclick="enviarWA('${c.nombre_apellido}','${c.celular}',${dias},'${c.precio}','${c.app_instalada}')" 
                                    class="bg-green-600 text-white p-2 rounded-lg text-[10px] font-bold uppercase">Mandar Msj</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- USUARIOS SISTEMA (Admin) ---
        async function cargarUsuariosSistema() {
            const { data } = await supabaseClient.from('usuarios_sistema').select('*');
            const cont = document.getElementById('lista-usuarios-sistema');
            cont.innerHTML = '';
            data.forEach(u => {
                cont.innerHTML += `<div class="bg-gray-800 p-3 border border-gray-700 rounded-xl flex justify-between items-center">
                    <p class="text-sm font-bold">${u.username} <span class="text-blue-500 text-[9px] uppercase">(${u.rol})</span></p>
                    <button onclick="eliminarUserSistema(${u.id})" class="text-red-500 text-xs font-bold">QUITAR ACCESO</button>
                </div>`;
            });
        }

        document.getElementById('formNuevoUsuario').onsubmit = async (e) => {
            e.preventDefault();
            await supabaseClient.from('usuarios_sistema').insert([{
                username: document.getElementById('newUsername').value,
                password: document.getElementById('newPassword').value,
                rol: document.getElementById('newRol').value
            }]);
            e.target.reset(); cargarUsuariosSistema();
        };

        async function eliminarUserSistema(id) {
            if (confirm('¿Quitar acceso?')) {
                await supabaseClient.from('usuarios_sistema').delete().eq('id', id);
                cargarUsuariosSistema();
            }
        }

        // --- AUXILIARES ---
        function enviarWA(nom, cel, dias, pre, app) {
            if (!cel) return alert("Sin número");
            const msj = dias <= 0 
                ? `Hola ${nom}! Te aviso de Tv Digital que venció tu ${app}. Renovación: $${pre}.`
                : `Hola ${nom}! Te aviso de Tv Digital que tu ${app} vence en ${dias} días. Precio: $${pre}.`;
            window.open(`https://wa.me/${cel.replace(/\D/g,'')}?text=${encodeURIComponent(msj)}`, '_blank');
        }

        function actualizarDashboard(data) {
            const hoy = new Date();
            let act = 0, ven = 0, pro = 0;
            data.forEach(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                if (d > 0) act++; else ven++;
                if (d > 0 && d <= 7) pro++;
            });
            document.getElementById('count-activos').innerText = act;
            document.getElementById('count-vencidos').innerText = ven;
            document.getElementById('count-pronto').innerText = pro;
        }

        function cambiarSeccion(sec) {
            document.getElementById('sec-clientes').classList.toggle('hidden', sec !== 'clientes');
            document.getElementById('sec-usuarios').classList.toggle('hidden', sec !== 'usuarios');
            document.getElementById('tab-clientes').classList.toggle('tab-activa', sec === 'clientes');
            document.getElementById('tab-usuarios').classList.toggle('tab-activa', sec === 'usuarios');
            if (sec === 'usuarios') cargarUsuariosSistema();
        }

        function cambiarFiltroApp(app, el) {
            filtroAppActual = app;
            document.querySelectorAll('.btn-app').forEach(b => b.classList.remove('filtro-activo'));
            el.classList.add('filtro-activo');
            filtrarClientes();
        }

        function cambiarFiltroEstado(est) {
            filtroEstadoActual = (filtroEstadoActual === est) ? 'TODOS' : est;
            document.querySelectorAll('.dashboard-card').forEach(c => c.classList.remove('card-seleccionada'));
            if (filtroEstadoActual !== 'TODOS') {
                const id = est === 'ACTIVOS' ? 'btn-filtro-activos' : est === 'VENCIDOS' ? 'btn-filtro-vencidos' : 'btn-filtro-pronto';
                document.getElementById(id).classList.add('card-seleccionada');
            }
            filtrarClientes();
        }

        function abrirModal(d = null) {
            const m = document.getElementById('modalCliente');
            document.getElementById('formCliente').reset();
            document.getElementById('clienteId').value = '';
            if (d) {
                document.getElementById('modalTitulo').innerText = "Editar Cliente";
                document.getElementById('clienteId').value = d.id;
                document.getElementById('nombre').value = d.nombre_apellido;
                document.getElementById('celular').value = d.celular || '';
                document.getElementById('ciudad').value = d.ciudad || '';
                document.getElementById('usuario').value = d.usuario;
                document.getElementById('clave').value = d.clave;
                document.getElementById('app').value = d.app_instalada;
                document.getElementById('vencimiento').value = d.fecha_vencimiento;
                document.getElementById('precio').value = d.precio;
            } else {
                document.getElementById('modalTitulo').innerText = "Nuevo Cliente";
            }
            m.classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modalCliente').classList.add('hidden'); }

        async function eliminarCliente(id) {
            if (confirm('¿Eliminar?')) {
                await supabaseClient.from('clientes').delete().eq('id', id);
                cargarClientes();
            }
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('light');
            localStorage.setItem('theme', document.documentElement.classList.contains('light') ? 'light' : 'dark');
        }

        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light');

        window.onload = checkSession;
    </script>
</body>
</html>
