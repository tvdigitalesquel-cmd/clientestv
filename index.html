<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tv Digital - Clientes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(var(--tw-date-invert, 1)); }
        @keyframes pulse-red {
            0%, 100% { background-color: rgba(220, 38, 38, 0.1); border-color: #ef4444; }
            50% { background-color: rgba(220, 38, 38, 0.3); border-color: #f87171; }
        }
        .alerta-vencimiento { animation: pulse-red 2s infinite; border-width: 2px; }
        .filtro-activo { border-color: white !important; transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .btn-app { transition: all 0.2s ease-in-out; border-width: 2px; }
        .light .bg-gray-900 { background-color: #f3f4f6; color: #1f2937; }
        .light .bg-gray-800 { background-color: #ffffff; color: #1f2937; }
        .light { --tw-date-invert: 0; }
    </style>
</head>
<body id="body-app" class="bg-gray-900 text-white font-sans min-h-screen pb-20 transition-all duration-300">

    <nav class="bg-gray-800 border-b border-gray-700 mb-6 sticky top-0 z-40 backdrop-blur-md bg-opacity-80">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex gap-4">
                <a href="index.html" class="py-4 font-bold uppercase text-xs border-b-3 border-blue-500 text-blue-500">Mis Clientes</a>
                <a href="equipos.html" id="link-equipos" class="py-4 font-bold uppercase text-xs hidden">Gestionar Equipo</a>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="bg-gray-700 p-2 rounded-full text-xs">☀️</button>
                <button onclick="logout()" class="text-red-500 font-bold text-xs uppercase border border-red-500/30 px-2 py-1 rounded">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4">
        <div id="modo-supervision" class="hidden mb-4 p-4 rounded-xl bg-purple-600 border-2 border-white shadow-lg text-center flex justify-between items-center animate-pulse">
            <p class="text-xs font-black uppercase italic text-white">⚠️ SUPERVISANDO A: <span id="vendedor-nombre"></span></p>
            <button onclick="salirSupervision()" class="bg-white text-purple-700 px-4 py-1 rounded-lg font-black text-[10px] uppercase shadow-md">Volver a mi cuenta</button>
        </div>

        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black text-blue-500 uppercase italic tracking-tighter">Panel Clientes</h1>
                <p id="info-sesion" class="text-xs text-gray-500 font-bold uppercase"></p>
            </div>
            <button onclick="abrirModal()" id="btn-nuevo-cliente" class="bg-blue-600 px-5 py-2 rounded-xl font-bold shadow-lg text-sm">+ Nuevo</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
            <div onclick="cambiarFiltroEstado('ACTIVOS')" class="bg-green-700 p-4 rounded-xl border-b-4 border-green-900 cursor-pointer">
                <p class="text-xs uppercase font-bold opacity-70">Activos</p>
                <h2 id="count-activos" class="text-3xl font-black">0</h2>
            </div>
            <div onclick="cambiarFiltroEstado('VENCIDOS')" class="bg-red-600 p-4 rounded-xl border-b-4 border-red-800 cursor-pointer">
                <p class="text-xs uppercase font-bold opacity-70">Vencidos</p>
                <h2 id="count-vencidos" class="text-3xl font-black">0</h2>
            </div>
            <div onclick="cambiarFiltroEstado('PRONTO')" class="bg-yellow-500 p-4 rounded-xl border-b-4 border-yellow-700 text-gray-900 cursor-pointer">
                <p class="text-xs uppercase font-bold opacity-70">Vencen pronto</p>
                <h2 id="count-pronto" class="text-3xl font-black">0</h2>
            </div>
        </div>

        <input type="text" id="inputBusqueda" onkeyup="filtrarClientes()" placeholder="🔍 Buscar cliente..." class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 mb-4 outline-none">
        
        <div id="contenedor-filtros-apps" class="flex flex-wrap gap-3 mb-8"></div>
        <div id="contenedor-clientes" class="grid gap-4"></div>
    </div>

    <div id="modalCliente" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        </div>

    <script>
        const SUPABASE_URL = 'https://vjbdhbbxbvoigbidquya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4ogrbtxBrBWBFj-NRJOrbg_XnpmO4pS';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosClientes = [];
        let filtroAppActual = 'TODOS';
        let filtroEstadoActual = 'TODOS';
        let currentUser = JSON.parse(localStorage.getItem('session_tvdigital'));
        
        // Recuperar si estamos en modo supervisión desde el almacenamiento local
        let idSupervisado = localStorage.getItem('supervisar_id');
        let nombreSupervisado = localStorage.getItem('supervisar_nombre');

        const configApps = {
            'LUMIX TV': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/lumixtv.png', color: '#2563eb', text: 'white' },
            'FEMON TV': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/femontv.png', color: '#dc2626', text: 'white' },
            'TV PLUS 2': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/tvplus2.png', color: '#16a34a', text: 'white' },
            'ZYRON TV': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/zyrontv.png', color: '#ca8a04', text: 'black' },
            'ZYRON TUBE': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/zyrontube.png', color: '#ea580c', text: 'white' },
            'POWER SIGNALS': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/powersignals.png', color: '#4f46e5', text: 'white' },
            'CAELUM': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/caelum.png', color: '#0891b2', text: 'white' }
        };

        function checkSession() {
            if (!currentUser) { window.location.href = 'logueo.html'; return; }
            
            if (currentUser.rol === 'admin' || currentUser.rol === 'revendedor') {
                document.getElementById('link-equipos').classList.remove('hidden');
            }

            if (idSupervisado) {
                document.getElementById('modo-supervision').classList.remove('hidden');
                document.getElementById('vendedor-nombre').innerText = nombreSupervisado;
                document.getElementById('btn-nuevo-cliente').classList.add('hidden');
            }

            document.getElementById('info-sesion').innerText = `${currentUser.rol}: ${currentUser.username}`;
            cargarClientes();
        }

        async function cargarClientes() {
            let idABuscar = idSupervisado || currentUser.id;
            const { data } = await supabaseClient.from('clientes').select('*').eq('creado_por', idABuscar).order('fecha_vencimiento', { ascending: true });
            todosLosClientes = data || [];
            generarFiltrosApps(todosLosClientes);
            actualizarDashboard(todosLosClientes);
            filtrarClientes();
        }

        function generarFiltrosApps(clientes) {
            const contenedor = document.getElementById('contenedor-filtros-apps');
            const appsEnUso = [...new Set(clientes.map(c => c.app_instalada))];
            let html = `<button onclick="cambiarFiltroApp('TODOS', this)" class="btn-app filtro-activo px-4 py-3 rounded-xl text-xs font-black uppercase bg-slate-700 flex items-center gap-2 border-transparent">TODAS</button>`;
            appsEnUso.forEach(app => {
                const config = configApps[app];
                if (config) {
                    html += `<button onclick="cambiarFiltroApp('${app}', this)" class="btn-app px-4 py-3 rounded-xl text-xs font-black uppercase flex items-center gap-2 border-transparent" style="background-color: ${config.color}; color: ${config.text};"><img src="${config.logo}" class="w-6 h-6 object-contain"> ${app}</button>`;
                }
            });
            contenedor.innerHTML = html;
        }

        function filtrarClientes() {
            const bus = document.getElementById('inputBusqueda').value.toLowerCase();
            const cont = document.getElementById('contenedor-clientes');
            const hoy = new Date();
            const filtrados = todosLosClientes.filter(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const cBus = c.nombre_apellido.toLowerCase().includes(bus) || c.usuario.toLowerCase().includes(bus);
                const cApp = filtroAppActual === 'TODOS' || c.app_instalada === filtroAppActual;
                let cEst = true;
                if (filtroEstadoActual === 'ACTIVOS') cEst = d > 0;
                if (filtroEstadoActual === 'VENCIDOS') cEst = d <= 0;
                if (filtroEstadoActual === 'PRONTO') cEst = (d > 0 && d <= 7);
                return cBus && cApp && cEst;
            });
            cont.innerHTML = '';
            filtrados.forEach(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const config = configApps[c.app_instalada];
                cont.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-5 rounded-3xl flex justify-between items-center shadow-lg ${d <= 2 ? 'alerta-vencimiento' : ''}">
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 bg-gray-900 rounded-2xl flex items-center justify-center border border-gray-700 overflow-hidden">
                                <img src="${config ? config.logo : ''}" class="w-full h-full object-contain">
                            </div>
                            <div>
                                <h3 class="font-black text-sm uppercase italic text-white">${c.nombre_apellido}</h3>
                                <p class="text-[9px] font-bold uppercase" style="color: ${config ? config.color : '#3b82f6'}">${c.app_instalada}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-6">
                            <p class="text-xl font-black ${d <= 0 ? 'text-red-500' : 'text-green-500'}">${d <= 0 ? 'VENCIDO' : d + ' DÍAS'}</p>
                            <button onclick="enviarWA('${c.nombre_apellido}','${c.celular}',${d},'${c.precio}','${c.app_instalada}')" class="bg-green-600 text-white py-2 px-3 rounded-xl text-[10px] font-black uppercase">WA</button>
                        </div>
                    </div>`;
            });
        }

        function salirSupervision() {
            localStorage.removeItem('supervisar_id');
            localStorage.removeItem('supervisar_nombre');
            location.reload();
        }

        function cambiarFiltroApp(app, el) { 
            filtroAppActual = app; 
            document.querySelectorAll('.btn-app').forEach(b => b.classList.remove('filtro-activo')); 
            el.classList.add('filtro-activo'); 
            filtrarClientes(); 
        }

        function actualizarDashboard(data) {
            const hoy = new Date(); let act = 0, ven = 0, pro = 0;
            data.forEach(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                if (d > 0) act++; else ven++;
                if (d > 0 && d <= 7) pro++;
            });
            document.getElementById('count-activos').innerText = act;
            document.getElementById('count-vencidos').innerText = ven;
            document.getElementById('count-pronto').innerText = pro;
        }

        function toggleTheme() { document.documentElement.classList.toggle('light'); }
        function logout() { localStorage.removeItem('session_tvdigital'); window.location.href = 'logueo.html'; }
        window.onload = checkSession;
    </script>
</body>
</html>
