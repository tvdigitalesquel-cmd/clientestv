<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tv Digital - Panel TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(var(--tw-date-invert, 1)); }
        @keyframes pulse-red {
            0%, 100% { background-color: rgba(220, 38, 38, 0.1); border-color: #ef4444; }
            50% { background-color: rgba(220, 38, 38, 0.3); border-color: #f87171; }
        }
        .alerta-vencimiento { animation: pulse-red 2s infinite; border-width: 2px; }
        .filtro-activo { border-color: #3b82f6 !important; font-weight: 800; transform: scale(1.05); }
        .dashboard-card { cursor: pointer; transition: transform 0.2s; }
        .dashboard-card:active { transform: scale(0.95); }
        .card-seleccionada { ring: 4px solid #3b82f6; ring-offset: 2px; }
        
        .light .bg-gray-900 { background-color: #f3f4f6; color: #1f2937; }
        .light .bg-gray-800 { background-color: #ffffff; color: #1f2937; }
        .light .border-gray-700 { border-color: #e5e7eb; }
        .light .text-white { color: #1f2937; }
        .light .text-gray-400 { color: #6b7280; }
        .light { --tw-date-invert: 0; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen pb-20 transition-colors duration-300">

    <div class="container mx-auto px-4 py-6">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-blue-500 uppercase tracking-wider">Panel Clientes</h1>
                <p class="text-gray-400 text-xs italic">Tv Digital </p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="bg-gray-800 dark:bg-gray-700 p-2 rounded-full border border-gray-700 shadow-md">
                    <span id="theme-icon">🌙</span>
                </button>
                <button onclick="abrirModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl font-bold shadow-lg transition active:scale-95">
                    + Nuevo
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 text-white">
            <div id="btn-filtro-activos" onclick="cambiarFiltroEstado('ACTIVOS')" class="dashboard-card bg-green-700 p-4 rounded-xl shadow-lg border-b-4 border-green-900">
                <p class="text-xs uppercase font-bold opacity-80">Activos</p>
                <h2 id="count-activos" class="text-4xl font-black my-2">0</h2>
            </div>
            <div id="btn-filtro-vencidos" onclick="cambiarFiltroEstado('VENCIDOS')" class="dashboard-card bg-red-600 p-4 rounded-xl shadow-lg border-b-4 border-red-800">
                <p class="text-xs uppercase font-bold opacity-80">Vencidos</p>
                <h2 id="count-vencidos" class="text-4xl font-black my-2">0</h2>
            </div>
            <div id="btn-filtro-pronto" onclick="cambiarFiltroEstado('PRONTO')" class="dashboard-card bg-yellow-500 p-4 rounded-xl shadow-lg border-b-4 border-yellow-700 text-gray-900">
                <p class="text-xs uppercase font-bold opacity-80">Vencen pronto</p>
                <h2 id="count-pronto" class="text-4xl font-black my-2 text-gray-900">0</h2>
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <div class="relative">
                <input type="text" id="inputBusqueda" onkeyup="filtrarClientes()" placeholder="🔍 Buscar cliente, usuario o ciudad..." 
                   class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white outline-none focus:border-blue-500 transition shadow-sm">
                <button onclick="limpiarFiltros()" class="absolute right-4 top-4 text-xs text-gray-400 underline uppercase font-bold">Limpiar</button>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="cambiarFiltroApp('TODOS', this)" class="btn-app filtro-activo flex-1 bg-gray-700 text-white border-2 border-transparent py-2 rounded-lg text-xs font-bold uppercase">Todas</button>
                <button onclick="cambiarFiltroApp('LUMIX', this)" class="btn-app flex-1 bg-blue-600 text-white border-2 border-transparent py-2 rounded-lg text-xs font-bold uppercase">Lumix</button>
                <button onclick="cambiarFiltroApp('TV PLUS 2', this)" class="btn-app flex-1 bg-green-600 text-white border-2 border-transparent py-2 rounded-lg text-xs font-bold uppercase">TV Plus 2</button>
                <button onclick="cambiarFiltroApp('FEMON', this)" class="btn-app flex-1 bg-purple-600 text-white border-2 border-transparent py-2 rounded-lg text-xs font-bold uppercase">Femon</button>
            </div>
        </div>

        <div id="contenedor-clientes" class="grid gap-4">
            <div class="text-center py-10 text-gray-500">Cargando datos...</div>
        </div>
    </div>

    <div id="modalCliente" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-gray-800 rounded-2xl p-6 w-full max-w-md border border-gray-700 shadow-2xl my-auto text-white">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitulo" class="text-xl font-bold text-blue-500">Datos Cliente</h2>
                <button onclick="cerrarModal()" class="text-gray-500 text-2xl">&times;</button>
            </div>
            <form id="formCliente" class="space-y-4">
                <input type="hidden" id="clienteId">
                <input type="text" id="nombre" placeholder="Nombre Completo" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none focus:border-blue-500" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="tel" id="celular" placeholder="Celular (Ej: 2945123456)" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none">
                    <input type="text" id="ciudad" placeholder="Ciudad" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="usuario" placeholder="Usuario App" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none" required>
                    <input type="text" id="clave" placeholder="Clave" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="app" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none">
                        <option value="LUMIX">LUMIX</option>
                        <option value="TV PLUS 2">TV PLUS 2</option>
                        <option value="FEMON">FEMON</option>
                    </select>
                    <input type="date" id="vencimiento" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none" required>
                </div>
                <input type="number" id="precio" placeholder="Precio $" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none focus:border-green-500">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-4 shadow-lg active:scale-95 transition uppercase tracking-widest">Guardar</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vjbdhbbxbvoigbidquya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4ogrbtxBrBWBFj-NRJOrbg_XnpmO4pS';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosClientes = [];
        let filtroAppActual = 'TODOS';
        let filtroEstadoActual = 'TODOS';

        function toggleTheme() {
            const body = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                icon.innerText = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light');
                icon.innerText = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'light' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.classList.add('light');
            document.getElementById('theme-icon').innerText = '☀️';
        }

        function abrirModal(editData = null) {
            const modal = document.getElementById('modalCliente');
            const form = document.getElementById('formCliente');
            form.reset();
            document.getElementById('clienteId').value = '';
            if (editData) {
                document.getElementById('modalTitulo').innerText = "Editar Cliente";
                document.getElementById('clienteId').value = editData.id;
                document.getElementById('nombre').value = editData.nombre_apellido;
                document.getElementById('celular').value = editData.celular || '';
                document.getElementById('ciudad').value = editData.ciudad || '';
                document.getElementById('usuario').value = editData.usuario;
                document.getElementById('clave').value = editData.clave;
                document.getElementById('app').value = editData.app_instalada;
                document.getElementById('vencimiento').value = editData.fecha_vencimiento;
                document.getElementById('precio').value = editData.precio || 0;
            } else {
                document.getElementById('modalTitulo').innerText = "Nuevo Cliente";
            }
            modal.classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modalCliente').classList.add('hidden'); }

        async function cargarClientes() {
            const { data, error } = await supabaseClient.from('clientes').select('*').order('fecha_vencimiento', { ascending: true });
            if (!error) {
                todosLosClientes = data;
                actualizarDashboard(data);
                filtrarClientes();
            }
        }

        function enviarWhatsApp(nombre, celular, dias, precio, app) {
            if (!celular) {
                alert("Este cliente no tiene un número de celular registrado.");
                return;
            }
            // Limpiar el número de espacios o guiones
            const numLimpiado = celular.replace(/\D/g, '');
            let mensaje = "";
            
            if (dias <= 0) {
                mensaje = `Hola ${nombre}! Te escribo de Tv Digital. Te informamos que tu servicio de ${app} ha vencido. El costo de renovación es de $${precio}. Avisanos si querés renovar!`;
            } else {
                mensaje = `Hola ${nombre}! Te escribo de Tecno Store Patagonia para avisarte que tu servicio de ${app} vence en ${dias} días. El costo es de $${precio}. Saludos!`;
            }
            
            const url = `https://wa.me/${numLimpiado}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        function actualizarDashboard(data) {
            const hoy = new Date();
            let activos = 0, vencidos = 0, pronto = 0;
            data.forEach(c => {
                const dias = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                if (dias > 0) activos++; else vencidos++;
                if (dias > 0 && dias <= 7) pronto++;
            });
            document.getElementById('count-activos').innerText = activos;
            document.getElementById('count-vencidos').innerText = vencidos;
            document.getElementById('count-pronto').innerText = pronto;
        }

        function cambiarFiltroApp(app, el) {
            filtroAppActual = app;
            document.querySelectorAll('.btn-app').forEach(b => b.classList.remove('filtro-activo'));
            el.classList.add('filtro-activo');
            filtrarClientes();
        }

        function cambiarFiltroEstado(estado) {
            filtroEstadoActual = (filtroEstadoActual === estado) ? 'TODOS' : estado;
            document.querySelectorAll('.dashboard-card').forEach(c => c.classList.remove('card-seleccionada'));
            if (filtroEstadoActual !== 'TODOS') {
                const idBtn = estado === 'ACTIVOS' ? 'btn-filtro-activos' : estado === 'VENCIDOS' ? 'btn-filtro-vencidos' : 'btn-filtro-pronto';
                document.getElementById(idBtn).classList.add('card-seleccionada');
            }
            filtrarClientes();
        }

        function filtrarClientes() {
            const busqueda = document.getElementById('inputBusqueda').value.toLowerCase();
            const contenedor = document.getElementById('contenedor-clientes');
            const hoy = new Date();
            
            const clientesFiltrados = todosLosClientes.filter(c => {
                const dias = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const coincideBusqueda = c.nombre_apellido.toLowerCase().includes(busqueda) || c.usuario.toLowerCase().includes(busqueda);
                const coincideApp = filtroAppActual === 'TODOS' || c.app_instalada === filtroAppActual;
                let coincideEstado = true;
                if (filtroEstadoActual === 'ACTIVOS') coincideEstado = dias > 0;
                if (filtroEstadoActual === 'VENCIDOS') coincideEstado = dias <= 0;
                if (filtroEstadoActual === 'PRONTO') coincideEstado = (dias > 0 && dias <= 7);
                return coincideBusqueda && coincideApp && coincideEstado;
            });

            contenedor.innerHTML = '';
            clientesFiltrados.forEach(c => {
                const dias = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const esAlerta = dias <= 2;
                const colorDias = dias <= 0 ? 'text-red-500 font-black' : dias <= 2 ? 'text-red-400 font-bold' : 'text-green-500';
                let colorApp = c.app_instalada === 'LUMIX' ? 'bg-blue-600' : c.app_instalada === 'FEMON' ? 'bg-purple-600' : 'bg-green-600';

                contenedor.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-4 rounded-2xl flex justify-between items-center shadow-sm transition-all ${esAlerta ? 'alerta-vencimiento' : ''}">
                        <div class="flex-1">
                            <h3 class="font-bold text-lg leading-tight">${c.nombre_apellido}</h3>
                            <div class="text-[10px] text-gray-400 uppercase font-bold">
                                ${c.ciudad ? '📍 ' + c.ciudad : ''} ${c.celular ? ' | 📱 ' + c.celular : ''}
                            </div>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[9px] ${colorApp} text-white px-2 py-0.5 rounded font-black uppercase italic">${c.app_instalada}</span>
                                <span class="text-xs text-gray-500 font-mono">${c.usuario}</span>
                            </div>
                        </div>
                        <div class="text-right mr-3">
                            <div class="${colorDias} text-xl">${dias <= 0 ? 'Vencido' : dias + ' d'}</div>
                            <div class="text-[11px] font-black text-blue-500">$${c.precio || 0}</div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <div class="flex gap-2">
                                <button onclick='abrirModal(${JSON.stringify(c)})' class="bg-gray-100 dark:bg-gray-700 p-2 rounded-lg text-blue-500 active:bg-gray-200">✏️</button>
                                <button onclick="eliminarCliente(${c.id})" class="bg-gray-100 dark:bg-gray-700 p-2 rounded-lg text-red-500 active:bg-gray-200">🗑️</button>
                            </div>
                            <button onclick="enviarWhatsApp('${c.nombre_apellido}', '${c.celular}', ${dias}, '${c.precio}', '${c.app_instalada}')" 
                                    class="bg-green-600 hover:bg-green-500 text-white p-2 rounded-lg flex items-center justify-center shadow-md active:scale-90 transition">
                                <span class="text-xs font-bold">WhatsApp</span>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        async function eliminarCliente(id) {
            if (confirm('¿Eliminar cliente?')) {
                const { error } = await supabaseClient.from('clientes').delete().eq('id', id);
                if (!error) cargarClientes();
            }
        }

        document.getElementById('formCliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('clienteId').value;
            const datos = {
                nombre_apellido: document.getElementById('nombre').value,
                celular: document.getElementById('celular').value,
                ciudad: document.getElementById('ciudad').value,
                usuario: document.getElementById('usuario').value,
                clave: document.getElementById('clave').value,
                app_instalada: document.getElementById('app').value,
                fecha_vencimiento: document.getElementById('vencimiento').value,
                precio: parseFloat(document.getElementById('precio').value) || 0
            };
            const res = id ? await supabaseClient.from('clientes').update(datos).eq('id', id) : await supabaseClient.from('clientes').insert([datos]);
            if (!res.error) { cerrarModal(); cargarClientes(); }
        });

        function limpiarFiltros() {
            filtroAppActual = 'TODOS';
            filtroEstadoActual = 'TODOS';
            document.getElementById('inputBusqueda').value = '';
            document.querySelectorAll('.dashboard-card').forEach(c => c.classList.remove('card-seleccionada'));
            document.querySelectorAll('.btn-app').forEach(b => b.classList.remove('filtro-activo'));
            document.querySelector('.btn-app').classList.add('filtro-activo');
            filtrarClientes();
        }

        window.onload = cargarClientes;
    </script>
</body>
</html>
