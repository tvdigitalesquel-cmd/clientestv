<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tv Digital - Clientes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(var(--tw-date-invert, 1)); }
        @keyframes pulse-red {
            0%, 100% { background-color: rgba(220, 38, 38, 0.1); border-color: #ef4444; }
            50% { background-color: rgba(220, 38, 38, 0.3); border-color: #f87171; }
        }
        .alerta-vencimiento { animation: pulse-red 2s infinite; border-width: 2px; }
        .filtro-activo { border-color: white !important; transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .btn-app { transition: all 0.2s ease-in-out; border-width: 2px; }
        .light .bg-gray-900 { background-color: #f3f4f6; color: #1f2937; }
        .light .bg-gray-800 { background-color: #ffffff; color: #1f2937; }
        .light { --tw-date-invert: 0; }

        /* Estilo para el selector de Apps Pro */
        .app-option {
            border: 2px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
        }
        .app-option.selected {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.1);
            transform: scale(1.05);
        }
    </style>
</head>
<body id="body-app" class="bg-gray-900 text-white font-sans min-h-screen pb-20 transition-all duration-300">

    <nav class="bg-gray-800 border-b border-gray-700 mb-6 sticky top-0 z-40 backdrop-blur-md bg-opacity-80">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex gap-4">
                <a href="index.html" class="py-4 font-bold uppercase text-xs border-b-3 border-blue-500 text-blue-500">Mis Clientes</a>
                <a href="equipo.html" id="link-equipos" class="py-4 font-bold uppercase text-xs hidden">Gestionar Equipo</a>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="bg-gray-700 p-2 rounded-full text-xs">☀️</button>
                <button onclick="logout()" class="text-red-500 font-bold text-xs uppercase border border-red-500/30 px-2 py-1 rounded">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black text-blue-500 uppercase italic tracking-tighter">Panel Clientes</h1>
                <p id="info-sesion" class="text-xs text-gray-500 font-bold uppercase"></p>
            </div>
            <button onclick="abrirModal()" id="btn-nuevo-cliente" class="bg-blue-600 px-6 py-3 rounded-2xl font-black shadow-lg text-sm active:scale-95 transition-transform">+ NUEVO CLIENTE</button>
        </header>

        <div class="grid grid-cols-3 gap-3 mb-6">
            <div onclick="cambiarFiltroEstado('ACTIVOS')" class="bg-green-700 p-4 rounded-xl border-b-4 border-green-900 cursor-pointer text-center">
                <p class="text-[10px] uppercase font-black opacity-70">Activos</p>
                <h2 id="count-activos" class="text-2xl font-black">0</h2>
            </div>
            <div onclick="cambiarFiltroEstado('VENCIDOS')" class="bg-red-600 p-4 rounded-xl border-b-4 border-red-800 cursor-pointer text-center">
                <p class="text-[10px] uppercase font-black opacity-70">Vencidos</p>
                <h2 id="count-vencidos" class="text-2xl font-black">0</h2>
            </div>
            <div onclick="cambiarFiltroEstado('PRONTO')" class="bg-yellow-500 p-4 rounded-xl border-b-4 border-yellow-700 text-gray-900 cursor-pointer text-center">
                <p class="text-[10px] uppercase font-black opacity-70">Pronto</p>
                <h2 id="count-pronto" class="text-2xl font-black">0</h2>
            </div>
        </div>

        <input type="text" id="inputBusqueda" onkeyup="filtrarClientes()" placeholder="🔍 Buscar cliente..." class="w-full bg-gray-800 border border-gray-700 rounded-2xl p-4 mb-4 outline-none focus:border-blue-500 transition-all shadow-inner">
        
        <div id="contenedor-filtros-apps" class="flex flex-wrap gap-3 mb-8"></div>
        <div id="contenedor-clientes" class="grid gap-4"></div>
    </div>

    <div id="modalCliente" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 border border-gray-700 w-full max-w-lg rounded-[32px] p-8 shadow-2xl overflow-y-auto max-h-[95vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black italic uppercase text-blue-500 tracking-tighter">Ficha de Cliente</h3>
                <button onclick="cerrarModal()" class="text-gray-500 hover:text-white text-3xl">&times;</button>
            </div>
            
            <form id="form-cliente" class="space-y-5">
                <div class="space-y-3">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">Información Personal</p>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="nombre-apellido" placeholder="Nombre y Apellido" class="bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-sm focus:border-blue-500 transition-colors" required>
                        <input type="text" id="celular-cliente" placeholder="WhatsApp" class="bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-sm focus:border-blue-500 transition-colors" required>
                    </div>
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">Credenciales del Servicio</p>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="usuario-tv" placeholder="Usuario TV" class="bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-sm focus:border-blue-500 transition-colors" required>
                        <input type="text" id="clave-tv" placeholder="Contraseña TV" class="bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-sm focus:border-blue-500 transition-colors" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-2">
                        <p class="text-[10px] font-black text-gray-500 uppercase ml-1">Ciudad</p>
                        <input type="text" id="ciudad-cliente" placeholder="Ciudad" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-sm" required>
                    </div>
                    <div class="space-y-2">
                        <p class="text-[10px] font-black text-gray-500 uppercase ml-1">Precio Cobrado</p>
                        <input type="number" id="precio-servicio" placeholder="$ 0.00" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-sm font-black text-green-500" required>
                    </div>
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">Seleccionar Aplicación</p>
                    <div id="app-selector" class="grid grid-cols-3 gap-2">
                        </div>
                    <input type="hidden" id="app-seleccionada" required>
                </div>

                <div class="space-y-2">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest ml-1">Fecha de Vencimiento</p>
                    <input type="date" id="vencimiento-cliente" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-sm font-bold" required>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-[20px] font-black uppercase italic tracking-tighter shadow-xl shadow-blue-900/40 transition-all active:scale-95">
                    REGISTRAR CLIENTE AHORA
                </button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vjbdhbbxbvoigbidquya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4ogrbtxBrBWBFj-NRJOrbg_XnpmO4pS';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosClientes = [];
        let filtroAppActual = 'TODOS';
        let filtroEstadoActual = 'TODOS';
        let currentUser = JSON.parse(localStorage.getItem('session_tvdigital'));
        
        const configApps = {
            'LUMIX TV': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/lumixtv.png', color: '#2563eb' },
            'FEMON TV': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/femontv.png', color: '#dc2626' },
            'TV PLUS 2': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/tvplus2.png', color: '#16a34a' },
            'ZYRON TV': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/zyrontv.png', color: '#ca8a04' },
            'ZYRON TUBE': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/zyrontube.png', color: '#ea580c' },
            'POWER SIGNALS': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/powersignals.png', color: '#4f46e5' },
            'CAELUM': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/caelum.png', color: '#0891b2' }
        };

        function checkSession() {
            if (!currentUser) { window.location.href = 'logueo.html'; return; }
            if (currentUser.rol === 'admin' || currentUser.rol === 'revendedor') document.getElementById('link-equipos').classList.remove('hidden');
            document.getElementById('info-sesion').innerText = `${currentUser.rol}: ${currentUser.username}`;
            cargarClientes();
            generarSelectorAppsModal();
        }

        async function cargarClientes() {
            const { data } = await supabaseClient.from('clientes').select('*').eq('creado_por', currentUser.id).order('fecha_vencimiento', { ascending: true });
            todosLosClientes = data || [];
            generarFiltrosApps(todosLosClientes);
            actualizarDashboard(todosLosClientes);
            filtrarClientes();
        }

        // Genera los botones de Apps dentro del modal
        function generarSelectorAppsModal() {
            const container = document.getElementById('app-selector');
            let html = '';
            for (const [name, config] of Object.entries(configApps)) {
                html += `
                    <div onclick="seleccionarAppModal('${name}', this)" class="app-option bg-gray-900 p-3 rounded-xl flex flex-col items-center gap-2 border border-gray-700">
                        <img src="${config.logo}" class="w-8 h-8 object-contain">
                        <span class="text-[8px] font-black uppercase text-center">${name}</span>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function seleccionarAppModal(nombre, elemento) {
            document.querySelectorAll('.app-option').forEach(el => el.classList.remove('selected'));
            elemento.classList.add('selected');
            document.getElementById('app-seleccionada').value = nombre;
        }

        function abrirModal() { document.getElementById('modalCliente').classList.remove('hidden'); }
        function cerrarModal() { 
            document.getElementById('modalCliente').classList.add('hidden'); 
            document.getElementById('form-cliente').reset();
            document.querySelectorAll('.app-option').forEach(el => el.classList.remove('selected'));
        }

        document.getElementById('form-cliente').onsubmit = async (e) => {
            e.preventDefault();
            const app = document.getElementById('app-seleccionada').value;
            if(!app) return alert("Por favor elige una aplicación.");

            const nuevo = {
                nombre_apellido: document.getElementById('nombre-apellido').value,
                celular: document.getElementById('celular-cliente').value,
                usuario: document.getElementById('usuario-tv').value,
                clave: document.getElementById('clave-tv').value,
                ciudad: document.getElementById('ciudad-cliente').value,
                precio: document.getElementById('precio-servicio').value,
                app_instalada: app,
                fecha_vencimiento: document.getElementById('vencimiento-cliente').value,
                creado_por: currentUser.id,
                vendedor_name: currentUser.username
            };
            const { error } = await supabaseClient.from('clientes').insert([nuevo]);
            if (error) alert("Error: " + error.message);
            else { cerrarModal(); cargarClientes(); }
        };

        function generarFiltrosApps(clientes) {
            const contenedor = document.getElementById('contenedor-filtros-apps');
            const appsEnUso = [...new Set(clientes.map(c => c.app_instalada))];
            let html = `<button onclick="cambiarFiltroApp('TODOS', this)" class="btn-app filtro-activo px-4 py-3 rounded-xl text-[10px] font-black uppercase bg-slate-700 flex items-center gap-2 border-transparent">TODAS</button>`;
            appsEnUso.forEach(app => {
                const config = configApps[app];
                if (config) {
                    html += `<button onclick="cambiarFiltroApp('${app}', this)" class="btn-app px-4 py-3 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 border-transparent" style="background-color: ${config.color}; color: white;"><img src="${config.logo}" class="w-5 h-5 object-contain"> ${app}</button>`;
                }
            });
            contenedor.innerHTML = html;
        }

        function filtrarClientes() {
            const bus = document.getElementById('inputBusqueda').value.toLowerCase();
            const cont = document.getElementById('contenedor-clientes');
            const hoy = new Date();
            const filtrados = todosLosClientes.filter(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const cBus = c.nombre_apellido.toLowerCase().includes(bus) || c.usuario.toLowerCase().includes(bus);
                const cApp = filtroAppActual === 'TODOS' || c.app_instalada === filtroAppActual;
                let cEst = true;
                if (filtroEstadoActual === 'ACTIVOS') cEst = d > 0;
                if (filtroEstadoActual === 'VENCIDOS') cEst = d <= 0;
                if (filtroEstadoActual === 'PRONTO') cEst = (d > 0 && d <= 7);
                return cBus && cApp && cEst;
            });
            cont.innerHTML = '';
            filtrados.forEach(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const config = configApps[c.app_instalada];
                cont.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-5 rounded-3xl flex justify-between items-center shadow-lg ${d <= 2 ? 'alerta-vencimiento' : ''}">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-gray-900 rounded-2xl flex items-center justify-center border border-gray-700">
                                <img src="${config ? config.logo : ''}" class="w-8 h-8 object-contain">
                            </div>
                            <div>
                                <h3 class="font-black text-sm uppercase italic">${c.nombre_apellido}</h3>
                                <p class="text-[9px] font-bold text-gray-500 uppercase">${c.app_instalada} • ${c.usuario}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-5">
                            <div class="text-right">
                                <p class="text-lg font-black ${d <= 0 ? 'text-red-500' : 'text-green-500'}">${d <= 0 ? 'VENCIDO' : d + ' D'}</p>
                                <p class="text-[9px] font-bold text-gray-400 uppercase italic">$${c.precio || 0}</p>
                            </div>
                            <button onclick="enviarWA('${c.nombre_apellido}','${c.celular}',${d})" class="bg-green-600 text-white p-3 rounded-xl"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-4 h-4"></button>
                        </div>
                    </div>`;
            });
        }

        function cambiarFiltroEstado(est) { filtroEstadoActual = est; filtrarClientes(); }
        function cambiarFiltroApp(app, el) { filtroAppActual = app; document.querySelectorAll('.btn-app').forEach(b => b.classList.remove('filtro-activo')); el.classList.add('filtro-activo'); filtrarClientes(); }
        function actualizarDashboard(data) {
            const hoy = new Date(); let act = 0, ven = 0, pro = 0;
            data.forEach(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                if (d > 0) act++; else ven++;
                if (d > 0 && d <= 7) pro++;
            });
            document.getElementById('count-activos').innerText = act;
            document.getElementById('count-vencidos').innerText = ven;
            document.getElementById('count-pronto').innerText = pro;
        }
        function toggleTheme() { document.documentElement.classList.toggle('light'); }
        function logout() { localStorage.removeItem('session_tvdigital'); window.location.href = 'logueo.html'; }
        window.onload = checkSession;
    </script>
</body>
</html>
