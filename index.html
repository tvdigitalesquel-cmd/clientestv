<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tv Digital - Panel Full</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .alerta-vencimiento { border: 2px solid #ef4444 !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .filtro-activo { border: 2px solid white !important; transform: translateY(-2px); }
        .app-option.selected { border-color: #3b82f6; background: rgba(59,130,246,0.2); filter: grayscale(0); opacity: 1; }
        .app-option { filter: grayscale(1); opacity: 0.5; transition: 0.3s; cursor: pointer; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-slate-800/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-700">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex gap-6">
                <a href="index.html" class="text-blue-500 font-black uppercase text-xs border-b-2 border-blue-500 pb-1">Mis Clientes</a>
                <a href="equipo.html" id="link-equipos" class="text-slate-400 font-black uppercase text-xs hover:text-white transition-colors">Gestionar Equipo</a>
            </div>
            <button onclick="logout()" class="text-red-500 font-bold text-[10px] uppercase border border-red-500/20 px-3 py-1 rounded-lg">Salir</button>
        </div>
    </nav>

    <div class="container mx-auto px-6 mt-8">
        <header class="flex justify-between items-end mb-10">
            <div>
                <p id="info-sesion" class="text-blue-400 font-black text-[10px] uppercase mb-1 tracking-widest"></p>
                <h1 class="text-4xl font-black uppercase italic italic">Panel <span class="text-blue-600">Clientes</span></h1>
            </div>
            <button onclick="abrirModal()" class="bg-blue-600 px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-900/40">+ Nuevo Cliente</button>
        </header>

        <div class="grid grid-cols-3 gap-4 mb-8">
            <div onclick="cambiarFiltroEstado('ACTIVOS')" class="bg-slate-800 p-6 rounded-[2rem] border-b-4 border-green-600 cursor-pointer">
                <p class="text-[9px] font-black uppercase opacity-60">Activos</p>
                <h2 id="count-activos" class="text-3xl font-black">0</h2>
            </div>
            <div onclick="cambiarFiltroEstado('VENCIDOS')" class="bg-slate-800 p-6 rounded-[2rem] border-b-4 border-red-600 cursor-pointer">
                <p class="text-[9px] font-black uppercase opacity-60">Vencidos</p>
                <h2 id="count-vencidos" class="text-3xl font-black">0</h2>
            </div>
            <div onclick="cambiarFiltroEstado('PRONTO')" class="bg-slate-800 p-6 rounded-[2rem] border-b-4 border-yellow-500 cursor-pointer">
                <p class="text-[9px] font-black uppercase opacity-60">Pronto</p>
                <h2 id="count-pronto" class="text-3xl font-black">0</h2>
            </div>
        </div>

        <input type="text" id="inputBusqueda" onkeyup="filtrarClientes()" placeholder="Buscar por nombre o usuario..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-4 px-6 mb-8 outline-none focus:border-blue-500">
        
        <div id="contenedor-filtros-apps" class="flex flex-wrap gap-4 mb-10"></div>
        <div id="contenedor-clientes" class="grid gap-6"></div>
    </div>

    <div id="modalCliente" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-xl rounded-[2.5rem] p-10 overflow-y-auto max-h-[90vh]">
            <h3 id="modal-titulo" class="text-2xl font-black uppercase italic mb-8 text-blue-500">Nuevo Cliente</h3>
            <form id="form-cliente" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="nombre-apellido" placeholder="Nombre" class="bg-slate-800 p-4 rounded-xl outline-none border border-slate-700" required>
                    <input type="text" id="celular-cliente" placeholder="WhatsApp" class="bg-slate-800 p-4 rounded-xl outline-none border border-slate-700" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="usuario-tv" placeholder="Usuario" class="bg-slate-800 p-4 rounded-xl outline-none border border-slate-700" required>
                    <input type="text" id="clave-tv" placeholder="Clave" class="bg-slate-800 p-4 rounded-xl outline-none border border-slate-700" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="ciudad-cliente" placeholder="Ciudad" class="bg-slate-800 p-4 rounded-xl outline-none border border-slate-700">
                    <input type="number" id="precio-servicio" placeholder="Precio $" class="bg-slate-800 p-4 rounded-xl outline-none border border-slate-700 font-bold text-green-500">
                </div>
                <div id="app-selector" class="grid grid-cols-4 gap-2 py-2"></div>
                <input type="hidden" id="app-seleccionada" required>
                <div>
                    <label class="text-[10px] font-black uppercase text-blue-400 ml-1">Vencimiento</label>
                    <input type="date" id="vencimiento-cliente" class="w-full bg-slate-800 p-4 rounded-xl outline-none border border-slate-700" required>
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="cerrarModal()" class="flex-1 bg-slate-700 py-4 rounded-xl font-black uppercase text-xs">Cancelar</button>
                    <button type="submit" class="flex-2 bg-blue-600 py-4 px-10 rounded-xl font-black uppercase text-xs">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vjbdhbbxbvoigbidquya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4ogrbtxBrBWBFj-NRJOrbg_XnpmO4pS';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosClientes = [];
        let filtroAppActual = 'TODOS';
        let filtroEstadoActual = 'TODOS';
        let currentUser = JSON.parse(localStorage.getItem('session_tvdigital'));
        
        const configApps = {
            'LUMIX TV': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/lumixtv.png', color: '#2563eb' },
            'FEMON TV': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/femontv.png', color: '#dc2626' },
            'TV PLUS 2': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/tvplus2.png', color: '#16a34a' },
            'ZYRON TV': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/zyrontv.png', color: '#ca8a04' },
            'ZYRON TUBE': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/zyrontube.png', color: '#ea580c' },
            'POWER SIGNALS': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/powersignals.png', color: '#4f46e5' },
            'CAELUM': { logo: 'https://raw.githubusercontent.com/tvdigitalesquel-cmd/clientestv/main/img/caelum.png', color: '#0891b2' }
        };

        async function cargarClientes() {
            const { data } = await supabaseClient.from('clientes').select('*').eq('creado_por', currentUser.id).order('fecha_vencimiento', { ascending: true });
            todosLosClientes = data || [];
            generarFiltrosApps(todosLosClientes);
            actualizarDashboard(todosLosClientes);
            filtrarClientes();
        }

        function filtrarClientes() {
            const bus = document.getElementById('inputBusqueda').value.toLowerCase();
            const cont = document.getElementById('contenedor-clientes');
            const hoy = new Date();
            const filtrados = todosLosClientes.filter(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const cBus = c.nombre_apellido.toLowerCase().includes(bus) || c.usuario.toLowerCase().includes(bus);
                const cApp = filtroAppActual === 'TODOS' || c.app_instalada === filtroAppActual;
                let cEst = true;
                if (filtroEstadoActual === 'ACTIVOS') cEst = d > 0;
                if (filtroEstadoActual === 'VENCIDOS') cEst = d <= 0;
                if (filtroEstadoActual === 'PRONTO') cEst = (d > 0 && d <= 7);
                return cBus && cApp && cEst;
            });
            cont.innerHTML = '';
            filtrados.forEach(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const config = configApps[c.app_instalada];
                cont.innerHTML += `
                    <div class="bg-slate-800 p-8 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center gap-6 shadow-xl ${d <= 2 ? 'alerta-vencimiento' : ''}">
                        <div class="flex items-center gap-6 w-full md:w-auto">
                            <div class="w-20 h-20 bg-slate-900 rounded-2xl flex items-center justify-center p-3 border border-slate-700">
                                <img src="${config?.logo}" class="w-full h-full object-contain">
                            </div>
                            <div>
                                <h3 class="text-2xl font-black uppercase italic">${c.nombre_apellido}</h3>
                                <p class="text-xs font-bold text-slate-500 uppercase">${c.app_instalada} • ${c.usuario}</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-6 w-full md:w-auto justify-between">
                            <div class="text-right">
                                <p class="text-3xl font-black ${d <= 0 ? 'text-red-500' : 'text-green-500'}">${d <= 0 ? 'VENCIDO' : d + ' DÍAS'}</p>
                                <p class="text-sm font-black text-slate-400">$${c.precio || 0}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="prepararEdicion('${c.id}')" class="bg-blue-600/20 text-blue-400 p-4 rounded-xl hover:bg-blue-600 hover:text-white transition-all">✏️</button>
                                <button onclick="eliminarCliente('${c.id}')" class="bg-red-600/20 text-red-400 p-4 rounded-xl hover:bg-red-600 hover:text-white transition-all">🗑️</button>
                                <button onclick="enviarWA('${c.nombre_apellido}','${c.celular}',${d})" class="bg-green-600 p-4 rounded-xl shadow-lg shadow-green-900/20"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-6 h-6"></button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        async function eliminarCliente(id) {
            if(confirm("¿Seguro que quieres eliminar este cliente?")) {
                const { error } = await supabaseClient.from('clientes').delete().eq('id', id);
                if (error) alert(error.message); else cargarClientes();
            }
        }

        function prepararEdicion(id) {
            const c = todosLosClientes.find(cli => cli.id == id);
            document.getElementById('edit-id').value = c.id;
            document.getElementById('nombre-apellido').value = c.nombre_apellido;
            document.getElementById('celular-cliente').value = c.celular;
            document.getElementById('usuario-tv').value = c.usuario;
            document.getElementById('clave-tv').value = c.clave;
            document.getElementById('ciudad-cliente').value = c.ciudad;
            document.getElementById('precio-servicio').value = c.precio;
            document.getElementById('vencimiento-cliente').value = c.fecha_vencimiento;
            document.getElementById('app-seleccionada').value = c.app_instalada;
            document.getElementById('modal-titulo').innerText = "Editar Cliente";
            abrirModal();
        }

        document.getElementById('form-cliente').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const payload = {
                nombre_apellido: document.getElementById('nombre-apellido').value,
                celular: document.getElementById('celular-cliente').value,
                usuario: document.getElementById('usuario-tv').value,
                clave: document.getElementById('clave-tv').value,
                ciudad: document.getElementById('ciudad-cliente').value,
                precio: document.getElementById('precio-servicio').value,
                app_instalada: document.getElementById('app-seleccionada').value,
                fecha_vencimiento: document.getElementById('vencimiento-cliente').value,
            };

            let res;
            if (id) res = await supabaseClient.from('clientes').update(payload).eq('id', id);
            else res = await supabaseClient.from('clientes').insert([{...payload, creado_por: currentUser.id, vendedor_name: currentUser.username}]);

            if (res.error) alert(res.error.message);
            else { cerrarModal(); cargarClientes(); }
        };

        // --- FUNCIONES AUXILIARES ---
        function generarSelectorAppsModal() {
            const container = document.getElementById('app-selector');
            container.innerHTML = Object.entries(configApps).map(([name, config]) => `
                <div onclick="seleccionarAppModal('${name}', this)" class="app-option bg-slate-950 p-3 rounded-xl flex flex-col items-center gap-1 border border-slate-700">
                    <img src="${config.logo}" class="w-8 h-8 object-contain">
                    <span class="text-[6px] font-black uppercase text-center">${name}</span>
                </div>
            `).join('');
        }
        function seleccionarAppModal(nombre, elemento) {
            document.querySelectorAll('.app-option').forEach(el => el.classList.remove('selected'));
            elemento.classList.add('selected');
            document.getElementById('app-seleccionada').value = nombre;
        }
        function abrirModal() { document.getElementById('modalCliente').classList.remove('hidden'); }
        function cerrarModal() { 
            document.getElementById('modalCliente').classList.add('hidden'); 
            document.getElementById('form-cliente').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('modal-titulo').innerText = "Nuevo Cliente";
        }
        function logout() { localStorage.removeItem('session_tvdigital'); window.location.href = 'logueo.html'; }
        window.onload = () => {
            if (!currentUser) window.location.href = 'logueo.html';
            document.getElementById('info-sesion').innerText = `Vendedor: ${currentUser.username}`;
            cargarClientes();
            generarSelectorAppsModal();
        };
    </script>
</body>
</html>
