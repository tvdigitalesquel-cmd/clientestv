<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecno Store - Panel TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        @keyframes pulse-red {
            0%, 100% { background-color: rgba(220, 38, 38, 0.1); border-color: #ef4444; }
            50% { background-color: rgba(220, 38, 38, 0.3); border-color: #f87171; }
        }
        .alerta-vencimiento { animation: pulse-red 2s infinite; border-width: 2px; }
        .filtro-activo { border-color: white !important; font-weight: 800; transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen pb-20">

    <div class="container mx-auto px-4 py-6">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-blue-500 uppercase tracking-wider">Panel Clientes</h1>
                <p class="text-gray-400 text-xs italic">Tecno Store Patagonia</p>
            </div>
            <button onclick="abrirModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl font-bold shadow-lg transition active:scale-95">
                + Nuevo
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-green-700 p-4 rounded-xl shadow-lg border-b-4 border-green-900">
                <p class="text-xs uppercase font-bold opacity-80">Activos</p>
                <h2 id="count-activos" class="text-4xl font-black my-2">0</h2>
            </div>
            <div class="bg-red-600 p-4 rounded-xl shadow-lg border-b-4 border-red-800">
                <p class="text-xs uppercase font-bold opacity-80">Vencidos</p>
                <h2 id="count-vencidos" class="text-4xl font-black my-2">0</h2>
            </div>
            <div class="bg-yellow-500 p-4 rounded-xl shadow-lg border-b-4 border-yellow-700 text-gray-900">
                <p class="text-xs uppercase font-bold opacity-80">Vencen pronto (7d)</p>
                <h2 id="count-pronto" class="text-4xl font-black my-2">0</h2>
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <input type="text" id="inputBusqueda" onkeyup="filtrarClientes()" placeholder="🔍 Buscar por nombre, usuario o ciudad..." 
                   class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white outline-none focus:border-blue-500 transition">
            
            <div class="flex flex-wrap gap-2">
                <button onclick="cambiarFiltro('TODOS', this)" class="btn-filtro filtro-activo flex-1 bg-gray-700 border-2 border-transparent py-2 rounded-lg text-xs font-bold uppercase">Todos</button>
                <button onclick="cambiarFiltro('LUMIX', this)" class="btn-filtro flex-1 bg-blue-600 border-2 border-transparent py-2 rounded-lg text-xs font-bold uppercase">Lumix</button>
                <button onclick="cambiarFiltro('TV PLUS 2', this)" class="btn-filtro flex-1 bg-green-600 border-2 border-transparent py-2 rounded-lg text-xs font-bold uppercase">TV Plus 2</button>
                <button onclick="cambiarFiltro('FEMON', this)" class="btn-filtro flex-1 bg-purple-600 border-2 border-transparent py-2 rounded-lg text-xs font-bold uppercase">Femon</button>
            </div>
        </div>

        <div id="contenedor-clientes" class="grid gap-4">
            <div class="text-center py-10 text-gray-500">Cargando datos...</div>
        </div>
    </div>

    <div id="modalCliente" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-gray-800 rounded-2xl p-6 w-full max-w-md border border-gray-700 shadow-2xl my-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitulo" class="text-xl font-bold text-blue-400">Datos del Cliente</h2>
                <button onclick="cerrarModal()" class="text-gray-500 text-2xl">&times;</button>
            </div>
            <form id="formCliente" class="space-y-4">
                <input type="hidden" id="clienteId">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Nombre Completo</label>
                    <input type="text" id="nombre" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none focus:border-blue-500" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="tel" id="celular" placeholder="Celular" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none">
                    <input type="text" id="ciudad" placeholder="Ciudad" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="usuario" placeholder="Usuario App" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none" required>
                    <input type="text" id="clave" placeholder="Clave" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="app" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none">
                        <option value="LUMIX">LUMIX</option>
                        <option value="TV PLUS 2">TV PLUS 2</option>
                        <option value="FEMON">FEMON</option>
                    </select>
                    <input type="date" id="vencimiento" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold transition shadow-lg mt-4">Guardar Registro</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vjbdhbbxbvoigbidquya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4ogrbtxBrBWBFj-NRJOrbg_XnpmO4pS';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosClientes = [];
        let filtroAppActual = 'TODOS';

        function abrirModal(editData = null) {
            const modal = document.getElementById('modalCliente');
            const form = document.getElementById('formCliente');
            form.reset();
            document.getElementById('clienteId').value = '';
            if (editData) {
                document.getElementById('modalTitulo').innerText = "Editar Cliente";
                document.getElementById('clienteId').value = editData.id;
                document.getElementById('nombre').value = editData.nombre_apellido;
                document.getElementById('celular').value = editData.celular || '';
                document.getElementById('ciudad').value = editData.ciudad || '';
                document.getElementById('usuario').value = editData.usuario;
                document.getElementById('clave').value = editData.clave;
                document.getElementById('app').value = editData.app_instalada;
                document.getElementById('vencimiento').value = editData.fecha_vencimiento;
            } else {
                document.getElementById('modalTitulo').innerText = "Nuevo Cliente";
            }
            modal.classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modalCliente').classList.add('hidden'); }

        async function cargarClientes() {
            const { data, error } = await supabaseClient.from('clientes').select('*').order('fecha_vencimiento', { ascending: true });
            if (!error) {
                todosLosClientes = data;
                actualizarDashboard(data);
                filtrarClientes();
            }
        }

        function actualizarDashboard(data) {
            const hoy = new Date();
            let activos = 0, vencidos = 0, pronto = 0;
            data.forEach(c => {
                const dias = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                if (dias > 0) activos++; else vencidos++;
                if (dias > 0 && dias <= 7) pronto++;
            });
            document.getElementById('count-activos').innerText = activos;
            document.getElementById('count-vencidos').innerText = vencidos;
            document.getElementById('count-pronto').innerText = pronto;
        }

        function cambiarFiltro(app, el) {
            filtroAppActual = app;
            document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('filtro-activo'));
            el.classList.add('filtro-activo');
            filtrarClientes();
        }

        function filtrarClientes() {
            const busqueda = document.getElementById('inputBusqueda').value.toLowerCase();
            const contenedor = document.getElementById('contenedor-clientes');
            
            const clientesFiltrados = todosLosClientes.filter(c => {
                const coincideBusqueda = c.nombre_apellido.toLowerCase().includes(busqueda) || 
                                        c.usuario.toLowerCase().includes(busqueda) || 
                                        (c.ciudad && c.ciudad.toLowerCase().includes(busqueda));
                const coincideApp = filtroAppActual === 'TODOS' || c.app_instalada === filtroAppActual;
                return coincideBusqueda && coincideApp;
            });

            contenedor.innerHTML = '';
            clientesFiltrados.forEach(c => {
                const hoy = new Date();
                const venc = new Date(c.fecha_vencimiento);
                const dias = Math.ceil((venc - hoy) / (1000 * 60 * 60 * 24));
                const esAlerta = dias <= 2;
                const colorDias = dias <= 0 ? 'text-red-500 font-black' : dias <= 2 ? 'text-red-400 font-bold' : 'text-green-400';
                
                let colorApp = c.app_instalada === 'LUMIX' ? 'bg-blue-600' : c.app_instalada === 'FEMON' ? 'bg-purple-600' : 'bg-green-600';

                contenedor.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-4 rounded-2xl flex justify-between items-center transition-all ${esAlerta ? 'alerta-vencimiento' : ''}">
                        <div class="flex-1">
                            <h3 class="font-bold text-lg leading-tight">${c.nombre_apellido}</h3>
                            <div class="text-[10px] text-gray-500 uppercase font-bold">${c.ciudad || ''} ${c.celular ? ' | ' + c.celular : ''}</div>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[9px] ${colorApp} text-white px-2 py-0.5 rounded font-black uppercase italic">${c.app_instalada}</span>
                                <span class="text-sm text-gray-400 font-mono">${c.usuario}</span>
                            </div>
                        </div>
                        <div class="text-right mr-3">
                            <div class="${colorDias} text-xl">${dias <= 0 ? 'Vencido' : dias + ' d'}</div>
                            <div class="text-[9px] text-gray-500 font-bold">${c.fecha_vencimiento}</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='abrirModal(${JSON.stringify(c)})' class="bg-gray-700 p-2 rounded-lg text-blue-400">✏️</button>
                            <button onclick="eliminarCliente(${c.id})" class="bg-gray-700 p-2 rounded-lg text-red-500">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        async function eliminarCliente(id) {
            if (confirm('¿Eliminar cliente?')) {
                const { error } = await supabaseClient.from('clientes').delete().eq('id', id);
                if (!error) cargarClientes();
            }
        }

        document.getElementById('formCliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('clienteId').value;
            const datos = {
                nombre_apellido: document.getElementById('nombre').value,
                celular: document.getElementById('celular').value,
                ciudad: document.getElementById('ciudad').value,
                usuario: document.getElementById('usuario').value,
                clave: document.getElementById('clave').value,
                app_instalada: document.getElementById('app').value,
                fecha_vencimiento: document.getElementById('vencimiento').value
            };
            const res = id ? await supabaseClient.from('clientes').update(datos).eq('id', id) : await supabaseClient.from('clientes').insert([datos]);
            if (!res.error) { cerrarModal(); cargarClientes(); }
        });

        window.onload = cargarClientes;
    </script>
</body>
</html>
