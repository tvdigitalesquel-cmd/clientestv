<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tv Digital - Panel Jerárquico</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(var(--tw-date-invert, 1)); }
        @keyframes pulse-red {
            0%, 100% { background-color: rgba(220, 38, 38, 0.1); border-color: #ef4444; }
            50% { background-color: rgba(220, 38, 38, 0.3); border-color: #f87171; }
        }
        .alerta-vencimiento { animation: pulse-red 2s infinite; border-width: 2px; }
        .filtro-activo { border-color: currentColor !important; font-weight: 800; transform: scale(1.05); }
        .dashboard-card { cursor: pointer; transition: transform 0.2s; }
        .dashboard-card:active { transform: scale(0.95); }
        .card-seleccionada { ring: 4px solid currentColor; ring-offset: 2px; }
        
        .modo-normal .accent-color { color: #3b82f6; }
        .modo-normal .accent-bg { background-color: #2563eb; }
        .modo-normal .tab-activa { border-bottom: 3px solid #3b82f6; color: #3b82f6; }

        .modo-supervision-activo { border: 5px solid #a855f7; }
        .modo-supervision-activo .accent-color { color: #d8b4fe; }
        .modo-supervision-activo .accent-bg { background-color: #9333ea; }
        .modo-supervision-activo #nav-main { background-color: #4c1d95 !important; }
        .modo-supervision-activo .tab-activa { border-bottom: 3px solid #d8b4fe; color: #d8b4fe; }

        .light .bg-gray-900 { background-color: #f3f4f6; color: #1f2937; }
        .light .bg-gray-800 { background-color: #ffffff; color: #1f2937; }
        .light .border-gray-700 { border-color: #e5e7eb; }
        .light .text-white { color: #1f2937; }
        .light .text-gray-400 { color: #6b7280; }
        .light { --tw-date-invert: 0; }
    </style>
</head>
<body id="body-app" class="modo-normal bg-gray-900 text-white font-sans min-h-screen pb-20 transition-all duration-300">

    <div id="contenido-app" class="hidden">
        <nav id="nav-main" class="bg-gray-800 border-b border-gray-700 mb-6 sticky top-0 z-40 backdrop-blur-md bg-opacity-80 transition-colors duration-500">
            <div class="container mx-auto px-4 flex justify-between items-center">
                <div class="flex gap-4">
                    <button onclick="cambiarSeccion('clientes')" id="tab-clientes" class="py-4 font-bold uppercase text-[10px] tab-activa">Mis Clientes</button>
                    <button onclick="cambiarSeccion('usuarios')" id="tab-usuarios" class="py-4 font-bold uppercase text-[10px] hidden">Gestionar Equipo</button>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleTheme()" class="bg-gray-700 p-2 rounded-full text-xs">☀️</button>
                    <button onclick="logout()" class="text-red-500 font-bold text-[10px] uppercase border border-red-500/30 px-2 py-1 rounded">Salir</button>
                </div>
            </div>
        </nav>

        <div class="container mx-auto px-4">
            <div id="modo-supervision" class="hidden mb-4 p-4 rounded-xl bg-purple-600 border-2 border-white shadow-lg text-center flex justify-between items-center animate-pulse">
                <p class="text-xs font-black uppercase italic text-white">⚠️ MODO SUPERVISIÓN: <span id="vendedor-nombre"></span></p>
                <button onclick="salirSupervision()" class="bg-white text-purple-700 px-4 py-1 rounded-lg font-black text-[10px] uppercase shadow-md">Volver a mi cuenta</button>
            </div>

            <section id="sec-clientes">
                <header class="flex justify-between items-center mb-6">
                    <div>
                        <h1 class="text-xl font-black accent-color uppercase italic tracking-tighter">Panel Clientes</h1>
                        <p id="info-sesion" class="text-[10px] text-gray-500 font-bold uppercase"></p>
                    </div>
                    <button onclick="abrirModal()" id="btn-nuevo-cliente" class="accent-bg px-5 py-2 rounded-xl font-bold shadow-lg text-sm">+ Nuevo</button>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
                    <div id="btn-filtro-activos" onclick="cambiarFiltroEstado('ACTIVOS')" class="dashboard-card bg-green-700 p-4 rounded-xl border-b-4 border-green-900">
                        <p class="text-[10px] uppercase font-bold opacity-70">Activos</p>
                        <h2 id="count-activos" class="text-3xl font-black">0</h2>
                    </div>
                    <div id="btn-filtro-vencidos" onclick="cambiarFiltroEstado('VENCIDOS')" class="dashboard-card bg-red-600 p-4 rounded-xl border-b-4 border-red-800">
                        <p class="text-[10px] uppercase font-bold opacity-70">Vencidos</p>
                        <h2 id="count-vencidos" class="text-3xl font-black">0</h2>
                    </div>
                    <div id="btn-filtro-pronto" onclick="cambiarFiltroEstado('PRONTO')" class="dashboard-card bg-yellow-500 p-4 rounded-xl border-b-4 border-yellow-700 text-gray-900">
                        <p class="text-[10px] uppercase font-bold opacity-70">Vencen pronto</p>
                        <h2 id="count-pronto" class="text-3xl font-black">0</h2>
                    </div>
                </div>

                <div class="space-y-4 mb-8">
                    <input type="text" id="inputBusqueda" onkeyup="filtrarClientes()" placeholder="🔍 Buscar por nombre o usuario..." 
                           class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    
                    <div class="flex flex-wrap gap-2">
                        <button onclick="cambiarFiltroApp('TODOS', this)" class="btn-app filtro-activo px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-gray-700">Todas</button>
                        <button onclick="cambiarFiltroApp('LUMIX TV', this)" class="btn-app px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-blue-600">Lumix</button>
                        <button onclick="cambiarFiltroApp('FEMON TV', this)" class="btn-app px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-red-600">Femon</button>
                        <button onclick="cambiarFiltroApp('TV PLUS 2', this)" class="btn-app px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-green-600">Plus 2</button>
                        <button onclick="cambiarFiltroApp('ZYRON TV', this)" class="btn-app px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-yellow-600 text-black">Zyron TV</button>
                        <button onclick="cambiarFiltroApp('ZYRON TUBE', this)" class="btn-app px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-orange-600">Zyron Tube</button>
                        <button onclick="cambiarFiltroApp('POWER SIGNALS', this)" class="btn-app px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-indigo-600">Power</button>
                    </div>
                </div>

                <div id="contenedor-clientes" class="grid gap-4"></div>
            </section>

            <section id="sec-usuarios" class="hidden">
                <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 mb-6 shadow-xl">
                    <h2 id="titulo-gestion-usuarios" class="text-lg font-bold accent-color mb-4 uppercase italic">Gestionar Equipo</h2>
                    <form id="formNuevoUsuario" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3">
                        <input type="text" id="newUsername" placeholder="Usuario" class="bg-gray-900 p-3 rounded-xl border border-gray-700 outline-none text-sm" required>
                        <input type="password" id="newPassword" placeholder="Contraseña" class="bg-gray-900 p-3 rounded-xl border border-gray-700 outline-none text-sm" required>
                        <select id="newRol" class="bg-gray-900 p-3 rounded-xl border border-gray-700 outline-none text-sm text-white font-bold uppercase"></select>
                        <input type="date" id="newVencimiento" class="bg-gray-900 p-3 rounded-xl border border-gray-700 outline-none text-sm text-white" required>
                        <button type="submit" class="accent-bg font-black rounded-xl uppercase text-[10px] text-white">Dar Acceso</button>
                    </form>
                </div>
                <div id="lista-usuarios-sistema" class="grid gap-3"></div>
            </section>
        </div>
    </div>

    <div id="modalCliente" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 rounded-3xl p-8 w-full max-w-md border border-gray-700 shadow-2xl text-white">
            <h2 id="modalTitulo" class="text-xl font-black accent-color mb-6 uppercase italic tracking-tighter">Datos del Cliente</h2>
            <form id="formCliente" class="space-y-4">
                <input type="hidden" id="clienteId">
                <input type="text" id="nombre" placeholder="Nombre y Apellido" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="tel" id="celular" placeholder="WhatsApp" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none">
                    <input type="text" id="ciudad" placeholder="Ciudad" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="usuario" placeholder="Usuario App" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none font-mono" required>
                    <input type="text" id="clave" placeholder="Clave App" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none font-mono" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="app" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none text-white font-bold">
                        <option value="LUMIX TV">LUMIX TV</option>
                        <option value="FEMON TV">FEMON TV</option>
                        <option value="TV PLUS 2">TV PLUS 2</option>
                        <option value="ZYRON TV">ZYRON TV</option>
                        <option value="ZYRON TUBE">ZYRON TUBE</option>
                        <option value="POWER SIGNALS">POWER SIGNALS</option>
                    </select>
                    <input type="date" id="vencimiento" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none" required>
                </div>
                <input type="number" id="precio" placeholder="Precio Renovación $" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none">
                <div class="flex gap-3 pt-6">
                    <button type="button" onclick="cerrarModal()" class="flex-1 bg-gray-700 py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Cerrar</button>
                    <button type="submit" class="flex-1 accent-bg py-4 rounded-2xl font-black uppercase text-xs text-white tracking-widest shadow-lg">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vjbdhbbxbvoigbidquya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4ogrbtxBrBWBFj-NRJOrbg_XnpmO4pS';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosClientes = [];
        let filtroAppActual = 'TODOS';
        let filtroEstadoActual = 'TODOS';
        let currentUser = JSON.parse(localStorage.getItem('session_tvdigital'));
        let idSupervisado = null;

        // --- MAPEO DE LOGOS DESDE GITHUB ---
        // REEMPLAZA ESTOS LINKS POR TUS LINKS RAW DE GITHUB
        const logosApp = {
            'LUMIX TV': 'https://raw.githubusercontent.com/TU_USUARIO/REPO/main/lumix.webp',
            'FEMON TV': 'https://raw.githubusercontent.com/TU_USUARIO/REPO/main/femon.webp',
            'TV PLUS 2': 'https://raw.githubusercontent.com/TU_USUARIO/REPO/main/plus2.webp',
            'ZYRON TV': 'https://raw.githubusercontent.com/TU_USUARIO/REPO/main/zyrontv.webp',
            'ZYRON TUBE': 'https://raw.githubusercontent.com/TU_USUARIO/REPO/main/zyrontube.webp',
            'POWER SIGNALS': 'https://raw.githubusercontent.com/TU_USUARIO/REPO/main/power.webp'
        };

        function checkSession() {
            if (!currentUser) {
                window.location.href = 'logueo.html';
            } else {
                document.getElementById('contenido-app').classList.remove('hidden');
                document.getElementById('info-sesion').innerText = `${currentUser.rol.toUpperCase()}: ${currentUser.username}`;
                
                const selRol = document.getElementById('newRol');
                if (currentUser.rol === 'admin') {
                    document.getElementById('tab-usuarios').classList.remove('hidden');
                    selRol.innerHTML = '<option value="admin">ADMINISTRADOR</option><option value="revendedor">REVENDEDOR</option><option value="vendedor">VENDEDOR</option>';
                } else if (currentUser.rol === 'revendedor') {
                    document.getElementById('tab-usuarios').classList.remove('hidden');
                    document.getElementById('titulo-gestion-usuarios').innerText = "Mis Vendedores";
                    selRol.innerHTML = '<option value="vendedor">VENDEDOR</option>';
                }
                cargarClientes();
            }
        }

        async function cargarClientes() {
            let query = supabaseClient.from('clientes').select('*');
            if (idSupervisado) query = query.eq('creado_por', idSupervisado);
            else if (currentUser.rol === 'vendedor') query = query.eq('creado_por', currentUser.id);
            else if (currentUser.rol === 'revendedor') {
                const { data: vends } = await supabaseClient.from('usuarios_sistema').select('id').eq('padre_id', currentUser.id);
                const ids = [currentUser.id, ...(vends || []).map(v => v.id)];
                query = query.in('creado_por', ids);
            }
            const { data } = await query.order('fecha_vencimiento', { ascending: true });
            todosLosClientes = data || [];
            actualizarDashboard(todosLosClientes);
            filtrarClientes();
        }

        function filtrarClientes() {
            const bus = document.getElementById('inputBusqueda').value.toLowerCase();
            const cont = document.getElementById('contenedor-clientes');
            const hoy = new Date();

            const filtrados = todosLosClientes.filter(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const cBus = c.nombre_apellido.toLowerCase().includes(bus) || c.usuario.toLowerCase().includes(bus);
                const cApp = filtroAppActual === 'TODOS' || c.app_instalada === filtroAppActual;
                let cEst = true;
                if (filtroEstadoActual === 'ACTIVOS') cEst = d > 0;
                if (filtroEstadoActual === 'VENCIDOS') cEst = d <= 0;
                if (filtroEstadoActual === 'PRONTO') cEst = (d > 0 && d <= 7);
                return cBus && cApp && cEst;
            });

            cont.innerHTML = '';
            filtrados.forEach(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                const imgLogo = logosApp[c.app_instalada] || '';
                
                cont.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-5 rounded-3xl flex justify-between items-center shadow-lg transition-all hover:border-gray-500 ${d <= 2 ? 'alerta-vencimiento' : ''}">
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 bg-gray-900 rounded-2xl overflow-hidden flex items-center justify-center border border-gray-700 shadow-inner">
                                ${imgLogo ? `<img src="${imgLogo}" class="w-full h-full object-cover" onerror="this.innerHTML='📱'; this.type='text'">` : '<span class="text-2xl">📱</span>'}
                            </div>
                            <div>
                                <h3 class="font-black text-sm uppercase italic tracking-tight text-white">${c.nombre_apellido}</h3>
                                <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">${c.app_instalada}</p>
                                <p class="text-[10px] text-gray-500 font-medium italic">${c.usuario} | ${c.clave}</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-6">
                            <div class="text-right">
                                <p class="text-xl font-black ${d <= 0 ? 'text-red-500' : 'text-green-500'}">
                                    ${d <= 0 ? 'VENCIDO' : d + ' DÍAS'}
                                </p>
                                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-tighter">Vence: ${c.fecha_vencimiento}</p>
                            </div>
                            
                            <div class="flex flex-col gap-2">
                                <div class="flex gap-2">
                                    <button onclick='abrirModal(${JSON.stringify(c)})' class="bg-gray-700/50 p-2 rounded-xl text-blue-400 hover:bg-blue-500 hover:text-white transition shadow-sm">✏️</button>
                                    <button onclick="eliminarCliente(${c.id})" class="bg-gray-700/50 p-2 rounded-xl text-red-500 hover:bg-red-500 hover:text-white transition shadow-sm">🗑️</button>
                                </div>
                                <button onclick="enviarWA('${c.nombre_apellido}','${c.celular}',${d},'${c.precio}','${c.app_instalada}')" 
                                    class="bg-green-600 hover:bg-green-500 text-white py-2 px-3 rounded-xl text-[9px] font-black uppercase flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-md">
                                    AVISAR WA
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // --- LÓGICA DE USUARIOS ---
        async function cargarUsuariosSistema() {
            let query = supabaseClient.from('usuarios_sistema').select('*');
            if (currentUser.rol === 'revendedor') query = query.eq('padre_id', currentUser.id);
            const { data } = await query;
            const cont = document.getElementById('lista-usuarios-sistema');
            cont.innerHTML = '';
            (data || []).forEach(u => {
                if (u.id === currentUser.id) return;
                cont.innerHTML += `
                    <div class="bg-gray-800 p-4 border border-gray-700 rounded-2xl flex justify-between items-center cursor-pointer hover:border-purple-500 transition shadow-md"
                         onclick="supervisarVendedor(${u.id}, '${u.username}')">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-8 bg-purple-500 rounded-full"></div>
                            <div>
                                <p class="font-black text-sm uppercase italic tracking-tighter text-white">${u.username}</p>
                                <p class="text-[9px] text-purple-400 font-bold uppercase tracking-widest">${u.rol}</p>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); eliminarUserSistema(${u.id})" class="text-red-500 text-[10px] font-black border border-red-500/20 px-4 py-2 rounded-xl hover:bg-red-500 hover:text-white transition">ELIMINAR ACCESO</button>
                    </div>
                `;
            });
        }

        function supervisarVendedor(id, nombre) {
            idSupervisado = id;
            document.getElementById('body-app').classList.replace('modo-normal', 'modo-supervision-activo');
            document.getElementById('vendedor-nombre').innerText = nombre;
            document.getElementById('modo-supervision').classList.remove('hidden');
            document.getElementById('btn-nuevo-cliente').classList.add('hidden');
            cambiarSeccion('clientes');
            cargarClientes();
        }

        function salirSupervision() {
            idSupervisado = null;
            document.getElementById('body-app').classList.replace('modo-supervision-activo', 'modo-normal');
            document.getElementById('modo-supervision').classList.add('hidden');
            document.getElementById('btn-nuevo-cliente').classList.remove('hidden');
            cargarClientes();
        }

        function enviarWA(nom, cel, d, pre, app) {
            if (!cel) return alert("¡El cliente no tiene número de WhatsApp!");
            const msj = d <= 0 ? `Hola ${nom}! Venció tu suscripción de ${app}. Renovación: $${pre}.` : `Hola ${nom}! Tu cuenta de ${app} vence en ${d} días. El precio de renovación es $${pre}.`;
            window.open(`https://wa.me/${cel.replace(/\D/g,'')}?text=${encodeURIComponent(msj)}`, '_blank');
        }

        function cambiarSeccion(sec) {
            document.getElementById('sec-clientes').classList.toggle('hidden', sec !== 'clientes');
            document.getElementById('sec-usuarios').classList.toggle('hidden', sec !== 'usuarios');
            document.getElementById('tab-clientes').classList.toggle('tab-activa', sec === 'clientes');
            document.getElementById('tab-usuarios').classList.toggle('tab-activa', sec === 'usuarios');
            if (sec === 'usuarios') cargarUsuariosSistema();
        }

        function abrirModal(d = null) {
            document.getElementById('formCliente').reset();
            document.getElementById('clienteId').value = d ? d.id : '';
            if(d) {
                document.getElementById('nombre').value = d.nombre_apellido;
                document.getElementById('celular').value = d.celular || '';
                document.getElementById('ciudad').value = d.ciudad || '';
                document.getElementById('usuario').value = d.usuario;
                document.getElementById('clave').value = d.clave;
                document.getElementById('app').value = d.app_instalada;
                document.getElementById('vencimiento').value = d.fecha_vencimiento;
                document.getElementById('precio').value = d.precio;
                document.getElementById('modalTitulo').innerText = "Editar Cliente";
            } else {
                document.getElementById('modalTitulo').innerText = "Nuevo Cliente";
            }
            document.getElementById('modalCliente').classList.remove('hidden');
        }

        document.getElementById('formCliente').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('clienteId').value;
            const datos = {
                nombre_apellido: document.getElementById('nombre').value,
                celular: document.getElementById('celular').value, ciudad: document.getElementById('ciudad').value,
                usuario: document.getElementById('usuario').value, clave: document.getElementById('clave').value,
                app_instalada: document.getElementById('app').value, fecha_vencimiento: document.getElementById('vencimiento').value,
                precio: parseFloat(document.getElementById('precio').value) || 0, creado_por: idSupervisado || currentUser.id
            };
            if (id) await supabaseClient.from('clientes').update(datos).eq('id', id);
            else await supabaseClient.from('clientes').insert([datos]);
            cerrarModal(); cargarClientes();
        };

        function actualizarDashboard(data) {
            const hoy = new Date(); let act = 0, ven = 0, pro = 0;
            data.forEach(c => {
                const d = Math.ceil((new Date(c.fecha_vencimiento) - hoy) / (1000 * 60 * 60 * 24));
                if (d > 0) act++; else ven++;
                if (d > 0 && d <= 7) pro++;
            });
            document.getElementById('count-activos').innerText = act;
            document.getElementById('count-vencidos').innerText = ven;
            document.getElementById('count-pronto').innerText = pro;
        }

        function toggleTheme() { document.documentElement.classList.toggle('light'); }
        function logout() { localStorage.removeItem('session_tvdigital'); window.location.href = 'logueo.html'; }
        function cerrarModal() { document.getElementById('modalCliente').classList.add('hidden'); }

        function cambiarFiltroApp(app, el) { 
            filtroAppActual = app; 
            document.querySelectorAll('.btn-app').forEach(b => b.classList.remove('filtro-activo'));
            el.classList.add('filtro-activo'); filtrarClientes(); 
        }

        function cambiarFiltroEstado(est) { 
            filtroEstadoActual = (filtroEstadoActual === est) ? 'TODOS' : est; 
            document.querySelectorAll('.dashboard-card').forEach(c => c.classList.remove('card-seleccionada'));
            if (filtroEstadoActual !== 'TODOS') document.getElementById(`btn-filtro-${est.toLowerCase()}`).classList.add('card-seleccionada');
            filtrarClientes(); 
        }

        async function eliminarCliente(id) { if (confirm('¿Seguro deseas eliminar este cliente?')) { await supabaseClient.from('clientes').delete().eq('id', id); cargarClientes(); } }
        async function eliminarUserSistema(id) { if (confirm('¿Revocar acceso a este usuario?')) { await supabaseClient.from('usuarios_sistema').delete().eq('id', id); cargarUsuariosSistema(); } }
        
        window.onload = checkSession;
    </script>
