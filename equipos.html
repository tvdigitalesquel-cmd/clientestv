<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Equipo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen">
    
    <nav class="bg-gray-800 border-b border-gray-700 mb-6">
        <div class="container mx-auto px-4 flex gap-4">
            <a href="index.html" class="py-4 font-bold uppercase text-xs">Mis Clientes</a>
            <a href="equipos.html" class="py-4 font-bold uppercase text-xs border-b-3 border-purple-500 text-purple-500">Gestionar Equipo</a>
        </div>
    </nav>

    <div class="container mx-auto px-4">
        <h1 class="text-2xl font-black text-purple-500 mb-6 uppercase italic">Administración de Equipo</h1>

        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 mb-8">
            <h2 class="text-sm font-bold mb-4 uppercase">Dar Acceso a Nuevo Vendedor</h2>
            <form id="formNuevoUsuario" class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <input type="text" id="newUsername" placeholder="Usuario" class="bg-gray-900 p-3 rounded-xl border border-gray-700 outline-none" required>
                <input type="password" id="newPassword" placeholder="Contraseña" class="bg-gray-900 p-3 rounded-xl border border-gray-700 outline-none" required>
                <select id="newRol" class="bg-gray-900 p-3 rounded-xl border border-gray-700 text-white font-bold"></select>
                <button type="submit" class="bg-purple-600 font-black rounded-xl uppercase text-xs">Crear Acceso</button>
            </form>
        </div>

        <h2 class="text-sm font-bold mb-4 uppercase text-gray-400">Tu Equipo Actual (Toca para ver sus clientes)</h2>
        <div id="lista-vendedores" class="grid gap-3"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vjbdhbbxbvoigbidquya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4ogrbtxBrBWBFj-NRJOrbg_XnpmO4pS';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const currentUser = JSON.parse(localStorage.getItem('session_tvdigital'));

        async function cargarVendedores() {
            const { data } = await supabaseClient.from('usuarios_sistema').select('*').eq('padre_id', currentUser.id);
            const cont = document.getElementById('lista-vendedores');
            cont.innerHTML = '';
            (data || []).forEach(u => {
                cont.innerHTML += `
                    <div onclick="verClientesDe('${u.id}', '${u.username}')" class="bg-gray-800 p-5 rounded-2xl border border-gray-700 flex justify-between items-center cursor-pointer hover:border-purple-500 transition-all">
                        <div>
                            <p class="font-black uppercase">${u.username}</p>
                            <p class="text-[10px] text-gray-500 uppercase">${u.rol}</p>
                        </div>
                        <span class="text-purple-500 font-black text-xs">VER CLIENTES →</span>
                    </div>`;
            });
        }

        function verClientesDe(id, nombre) {
            localStorage.setItem('supervisar_id', id);
            localStorage.setItem('supervisar_nombre', nombre);
            window.location.href = 'index.html';
        }

        // Lógica para el select de roles según quién sea el usuario
        if (currentUser.rol === 'admin') {
            document.getElementById('newRol').innerHTML = '<option value="revendedor">REVENDEDOR</option><option value="vendedor">VENDEDOR</option>';
        } else {
            document.getElementById('newRol').innerHTML = '<option value="vendedor">VENDEDOR</option>';
        }

        document.getElementById('formNuevoUsuario').onsubmit = async (e) => {
            e.preventDefault();
            const nuevo = {
                username: document.getElementById('newUsername').value,
                password: document.getElementById('newPassword').value,
                rol: document.getElementById('newRol').value,
                padre_id: currentUser.id
            };
            await supabaseClient.from('usuarios_sistema').insert([nuevo]);
            cargarVendedores();
            e.target.reset();
        };

        window.onload = cargarVendedores;
    </script>
</body>
</html>
